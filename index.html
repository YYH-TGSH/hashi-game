  <script type="text/babel">

    const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, collection, deleteDoc } = window.firebaseAPI;

    // === Firebase 配置 ===
    const providedConfig = {

    // === 上海地鐵 20 色票 ===
    const COLORS = [
      '#E3002B', '#F35B00', '#FFC90E', '#D7157A', '#E895C0', 
      '#007A61', '#87D300', '#C4D600', '#8DD1BF', '#616130',

      '#41136A', '#935CB9', '#BCA8D1', '#7A0026', '#BC7B70'

    // === 關卡設定 ===
    const LEVELS = [
      { id: 1, name: "5x5 幼幼班", width: 5, height: 5, description: "最簡單的暖身關卡，試著連連看。" },
      { id: 2, name: "10x10 標準", width: 10, height: 10, description: "標準難度，注意所有島嶼都要連通喔！" },
      { id: 3, name: "10x20 手機直式", width: 10, height: 20, description: "適合手機滑動的長條形地圖。" },
      { id: 4, name: "15x15 魔王", width: 15, height: 15, description: "極具挑戰性！找尋角落的大數字作為突破口。" },
      { id: 5, name: "20x20 史詩", width: 20, height: 20, description: "超大地圖，請善用右下角的畫面縮放功能。" },
      { id: 'custom', name: "⚙️ 自訂尺寸", width: 30, height: 30, description: "自訂地圖長寬，適合多人合作挑戰！" }
    ];

    // 取出可用且不重複顏色的輔助函數
    const getAvailableColor = (currentPlayers) => {
        const usedColors = currentPlayers.map(p => p.color);
        const available = COLORS.filter(c => !usedColors.includes(c));
        if (available.length > 0) {
            return available[Math.floor(Math.random() * available.length)];
        }
        return COLORS[Math.floor(Math.random() * COLORS.length)];
    };

    // ==========================================
    // 全新高密度智慧演算法 (網格掃描 + Kruskal生成樹)
    // ==========================================
    function generateRandomHashi(levelDef) {
      const W = levelDef.width, H = levelDef.height;
      let grid = Array(H).fill(null).map(() => Array(W).fill(null));

      // 1. 隨機放置島嶼 (高密度，且保證無正交相鄰，避免 2x2 填滿)
      for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
              let hasNeighbor = false;
              if (x > 0 && grid[y][x-1]) hasNeighbor = true;
              if (y > 0 && grid[y-1][x]) hasNeighbor = true;
              if (x < W-1 && grid[y][x+1]) hasNeighbor = true;
              if (y < H-1 && grid[y+1][x]) hasNeighbor = true;

              if (!hasNeighbor) {
                  if (Math.random() < 0.45) grid[y][x] = true;
              }
          }
      }

      // 2. 強制填補 3x3 空白區域 (確保不出現 3x3 完全無島嶼)
      for (let y = 0; y <= H - 3; y++) {
          for (let x = 0; x <= W - 3; x++) {
              let hasIsland = false;
              for (let dy = 0; dy < 3; dy++) {
                  for (let dx = 0; dx < 3; dx++) {
                      if (grid[y+dy][x+dx]) hasIsland = true;
                  }
              }
              if (!hasIsland) {
                  let emptyCells = [];
                  for (let dy = 0; dy < 3; dy++) {
                      for (let dx = 0; dx < 3; dx++) {
                          let cy = y + dy, cx = x + dx;
                          let hasNeighbor = false;
                          if (cx > 0 && grid[cy][cx-1]) hasNeighbor = true;
                          if (cy > 0 && grid[cy-1][cx]) hasNeighbor = true;
                          if (cx < W-1 && grid[cy][cx+1]) hasNeighbor = true;
                          if (cy < H-1 && grid[cy+1][cx]) hasNeighbor = true;
                          if (!hasNeighbor) emptyCells.push({x: cx, y: cy});
                      }
                  }
                  if (emptyCells.length > 0) {
                      let pick = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                      grid[pick.y][pick.x] = true;
                  }
              }
          }
      }

      // 3. 建立島嶼物件
      let islands = [];
      let islandId = 1;
      for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
              if (grid[y][x]) {
                  let isl = { id: islandId++, x: x, y: y, req: 0 };
                  islands.push(isl);
                  grid[y][x] = isl;
              }
          }
      }

      // 4. 尋找所有可能的橋樑路徑 (視線內無阻擋)
      let potentialBridges = [];
      for (let i = 0; i < islands.length; i++) {
          let island = islands[i];
          // 向右找
          for (let x = island.x + 1; x < W; x++) {
              if (grid[island.y][x]) {
                  potentialBridges.push({ from: island.id, to: grid[island.y][x].id, type: 'h', minX: island.x, maxX: x, y: island.y, len: x - island.x });
                  break;
              }
          }
          // 向下找
          for (let y = island.y + 1; y < H; y++) {
              if (grid[y][island.x]) {
                  potentialBridges.push({ from: island.id, to: grid[y][island.x].id, type: 'v', minY: island.y, maxY: y, x: island.x, len: y - island.y });
                  break;
              }
          }
      }

      // 依長度排序，優先連接近的島嶼，減少長橋交叉，讓畫面更順眼
      potentialBridges.sort((a, b) => a.len - b.len + (Math.random() - 0.5));

      // 5. Kruskal's 演算法建立連通圖 (避免任何交叉)
      let uf = new Map();
      islands.forEach(i => uf.set(i.id, i.id));
      function find(i) { if (uf.get(i) === i) return i; let root = find(uf.get(i)); uf.set(i, root); return root; }
      function union(i, j) { let rootI = find(i), rootJ = find(j); if (rootI !== rootJ) { uf.set(rootI, rootJ); return true; } return false; }

      let acceptedBridges = [];

      function doesIntersect(b) {
          for (let i = 0; i < acceptedBridges.length; i++) {
              let a = acceptedBridges[i];
              if (a.type === 'h' && b.type === 'v') {
                  if (b.x > a.minX && b.x < a.maxX && a.y > b.minY && a.y < b.maxY) return true;
              } else if (a.type === 'v' && b.type === 'h') {
                  if (a.x > b.minX && a.x < b.maxX && b.y > a.minY && b.y < a.maxY) return true;
              }
          }
          return false;
      }

      let rejectedBridges = [];
      for (let i=0; i<potentialBridges.length; i++) {
          let b = potentialBridges[i];
          if (doesIntersect(b)) continue;
          if (union(b.from, b.to)) {
              acceptedBridges.push(b);
          } else {
              rejectedBridges.push(b);
          }
      }

      // 增加額外的橋樑產生迴圈 (加入環狀路徑，讓解題變化更多)
      for (let i=0; i<rejectedBridges.length; i++) {
          let b = rejectedBridges[i];
          if (!doesIntersect(b) && Math.random() < 0.4) {
              acceptedBridges.push(b);
          }
      }

      // 6. 分配橋樑數量 (1 或 2) 並計算島嶼需求數字
      let islandDegree = {};
      islands.forEach(i => islandDegree[i.id] = 0);
      
      acceptedBridges.forEach(b => {
          b.count = Math.random() < 0.5 ? 1 : 2;
          islandDegree[b.from] += b.count;
          islandDegree[b.to] += b.count;
      });

      islands = islands.filter(i => islandDegree[i.id] > 0);
      islands.forEach(i => i.req = islandDegree[i.id]);

      // 7. 確保全圖單一連通 (保留最大連通塊，刪除因交叉限制而被孤立的碎塊)
      if (islands.length > 0) {
          let adj = {};
          islands.forEach(i => adj[i.id] = []);
          acceptedBridges.forEach(b => {
              if (adj[b.from] && adj[b.to]) {
                  adj[b.from].push(b.to);
                  adj[b.to].push(b.from);
              }
          });

          let visited = new Set();
          let components = [];
          for (let i=0; i<islands.length; i++) {
              let island = islands[i];
              if (!visited.has(island.id)) {
                  let comp = [];
                  let q = [island.id];
                  visited.add(island.id);
                  while(q.length > 0) {
                      let curr = q.shift();
                      comp.push(curr);
                      for (let j=0; j<adj[curr].length; j++) {
                          let n = adj[curr][j];
                          if (!visited.has(n)) {
                              visited.add(n);
                              q.push(n);
                          }
                      }
                  }
                  components.push(comp);
              }
          }

          components.sort((a, b) => b.length - a.length);
          let largestCompSet = new Set(components[0]);

          islands = islands.filter(i => largestCompSet.has(i.id));
          acceptedBridges = acceptedBridges.filter(b => largestCompSet.has(b.from) && largestCompSet.has(b.to));
      }

      return { 
        id: levelDef.id, name: levelDef.name, width: W, height: H, 
        description: levelDef.description, isRandom: true, islands: islands, solution: acceptedBridges 
      };
    }

    function generateEmptyBridges(level) {
      let pb = []; let bridgeId = 1;
      const isl = (level && level.islands) ? level.islands : [];
      for (let i = 0; i < isl.length; i++) {
        let a = isl[i]; let rN = null, bN = null;
        for (let j = 0; j < isl.length; j++) {
          let b = isl[j];
          if (b.y === a.y && b.x > a.x) if (!rN || b.x < rN.x) rN = b;
          if (b.x === a.x && b.y > a.y) if (!bN || b.y < bN.y) bN = b;
        }
        if (rN) pb.push({ id: bridgeId++, from: a.id, to: rN.id, type: 'h', count: 0, draftCount: 0 });
        if (bN) pb.push({ id: bridgeId++, from: a.id, to: bN.id, type: 'v', count: 0, draftCount: 0 });
      }
      return pb;
    }

    function formatTime(secs) {
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(secs % 60).padStart(2, '0');
      return m + ":" + s;
    }

    // ==========================================
    // React 主程式
    // ==========================================

    function HashiGame() {
      // === 唯一身分識別與個人狀態 ===
      const playerIdRef = useRef(Math.random().toString(36).substring(2, 12));
      const myId = playerIdRef.current;
      const myNameRef = useRef("");
      const myColorRef = useRef(COLORS[0]);

      const initialDataRef = useRef(null);
      if (!initialDataRef.current) {
        initialDataRef.current = generateRandomHashi(LEVELS[1]);
      }

      // === 基本狀態 ===
      const [user, setUser] = useState(null);
      const [authError, setAuthError] = useState(""); 
      const [screen, setScreen] = useState('home');
      const [engine, setEngine] = useState('none');
      const [currentLevelId, setCurrentLevelId] = useState(2); 
      
      const [randomLevelData, setRandomLevelData] = useState(initialDataRef.current);
      const [bridges, setBridges] = useState(() => generateEmptyBridges(initialDataRef.current));
      
      // 塗鴉軌跡狀態
      const [strokes, setStrokes] = useState([]);
      const [currentPath, setCurrentPath] = useState(null);
      const [eraserPos, setEraserPos] = useState(null);

      const [history, setHistory] = useState([]);
      const [isWon, setIsWon] = useState(false);
      const [hideVictoryModal, setHideVictoryModal] = useState(false);
      const [toastMsg, setToastMsg] = useState("");
      
      const [startTime, setStartTime] = useState(Date.now());
      const [elapsedTime, setElapsedTime] = useState(0);
      const [zoomLevel, setZoomLevel] = useState(1);
      const [showSolution, setShowSolution] = useState(false);
      const [isHeaderCollapsed, setIsHeaderCollapsed] = useState(false);
      
      // === 存檔與自訂尺寸狀態 ===
      const [showSaveModal, setShowSaveModal] = useState(false);
      const [saveCode, setSaveCode] = useState("");
      
      const [showCustomModal, setShowCustomModal] = useState(false);
      const [tempWidth, setTempWidth] = useState(30);
      const [tempHeight, setTempHeight] = useState(30);

      // 互動模式 (0: 實線, 1: 草稿, 2: 繪圖)
      const [interactionMode, setInteractionMode] = useState(0);
      const [drawSubMode, setDrawSubMode] = useState('pen'); // 'pen' 或 'eraser'
      
      const modeIcons = ['🖋️', '✏️', '🖌️'];
      const modeTitles = ['實線模式', '草稿模式', '繪圖作記號'];

      const [zoomModeIdx, setZoomModeIdx] = useState(0); 
      const [isClosingModal, setIsClosingModal] = useState(false);
      const [isGenerating, setIsGenerating] = useState(false);

      // 色票選擇器狀態：紀錄目前正在修改哪個玩家的顏色
      const [colorPickerTarget, setColorPickerTarget] = useState(null);
      // 彩蛋顏色解鎖序列追蹤
      const [colorSeq, setColorSeq] = useState([]);

      // === 多人連線與游標狀態 ===
      const [roomId, setRoomId] = useState("");
      const [isHost, setIsHost] = useState(false);
      const [tempRoomId, setTempRoomId] = useState("");
      const [tempPlayerName, setTempPlayerName] = useState("");
      const [stableMode, setStableMode] = useState(false); 
      const [titleClicks, setTitleClicks] = useState(0);
      const [playersList, setPlayersList] = useState([]);
      const [isConnecting, setIsConnecting] = useState(false);

      const [showOtherCursors, setShowOtherCursors] = useState(true);
      const [cursors, setCursors] = useState({});
      const [ripples, setRipples] = useState([]);
      
      const isMultiplayer = engine !== 'none';
      const svgRef = useRef(null);
      const lastCursorSend = useRef(0);
      const isDrawingRef = useRef(false);

      // === Refs ===
      const engineRef = useRef('none');
      const isHostRef = useRef(false);
      const peerRef = useRef(null);
      const connRef = useRef(null); 
      const connsRef = useRef([]); 
      const roomRef = useRef(null);
      const unsubRef = useRef(null);
      const zoomContainerRef = useRef(null);
      const lastPinchDist = useRef(null);
      const stateRef = useRef({ bridges: [], randomLevelData: null, showSolution: false, startTime: Date.now(), levelId: 2, strokes: [] });

      // === 網格與畫布尺寸計算 ===
      const cLevel = randomLevelData || { islands: [], description: "" };
      const islandsToRender = cLevel.islands || [];
      const maxGridX = islandsToRender.length > 0 ? Math.max.apply(Math, islandsToRender.map(i => i.x).concat([6])) : 6; 
      const maxGridY = islandsToRender.length > 0 ? Math.max.apply(Math, islandsToRender.map(i => i.y).concat([6])) : 6;
      const gridWidth = (cLevel.width) ? cLevel.width : (maxGridX + 1);
      const gridHeight = (cLevel.height) ? cLevel.height : (maxGridY + 1);
      
      const SCALE = 65; const PADDING = 85; const ISLAND_RADIUS = 22;
      const svgW = (gridWidth - 1) * SCALE + PADDING * 2;
      const svgH = (gridHeight - 1) * SCALE + PADDING * 2;
      const hasSolution = cLevel.solution && cLevel.solution.length > 0;

      // 取得玩家顏色 (解決舊版延遲 Bug：確保渲染時即時同步名單資料)
      const getPlayerColor = (uid) => {
          const p = playersList.find(p => p.id === uid);
          return p ? p.color : COLORS[0];
      };
      
      // 單一數據源：永遠根據最新 React State 決定自己的顏色
      const myCurrentColor = getPlayerColor(myId);
      const _mePlayer = playersList.find(p => p.id === myId);
      myNameRef.current = _mePlayer ? _mePlayer.name : "";
      myColorRef.current = myCurrentColor;

      // 當非 PeerJS 模式時（如單機或 Firebase），鎖定繪圖功能
      useEffect(function() {
        if (engine !== 'peerjs' && interactionMode >= 2) {
            setInteractionMode(0);
        }
      }, [engine, interactionMode]);

      useEffect(function() {
        const initAuth = async function() {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch(err) { 
            console.error("Firebase 登入失敗", err); 
            setAuthError(err.code || err.message);
          }
        };
        initAuth();
        onAuthStateChanged(auth, function(u) { if(u) setUser(u); });
      }, []);

      useEffect(function() {
        stateRef.current = { bridges, randomLevelData, showSolution, startTime, levelId: currentLevelId, strokes };
      }, [bridges, randomLevelData, showSolution, startTime, currentLevelId, strokes]);

      useEffect(function() {
        if (isWon || screen !== 'game') return;
        const t = setInterval(() => setElapsedTime(Math.floor((Date.now() - startTime) / 1000)), 1000);
        return () => clearInterval(t);
      }, [startTime, isWon, screen]);

      // === 畫布縮放與面板自動收合 ===
      useEffect(function() {
        if (screen !== 'game') return;
        const el = zoomContainerRef.current;
        if (!el) return;
        let touchStartY = null;

        const handleTouchStart = (e) => { if (e.touches.length === 1) { touchStartY = e.touches[0].clientY; } };
        const handleTouchMove = (e) => {
          // 繪圖模式下鎖死畫布原生滑動，防止干擾
          if (interactionMode >= 2) return;
          
          if (e.touches.length === 2) {
            e.preventDefault(); 
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            if (lastPinchDist.current) {
              const delta = dist - lastPinchDist.current;
              setZoomLevel(prev => Math.min(Math.max(prev + delta * 0.005, 0.4), 3.5));
              setZoomModeIdx(0); // 取消自動縮放狀態
            }
            lastPinchDist.current = dist;
          } else if (e.touches.length === 1 && touchStartY !== null) {
            const dy = e.touches[0].clientY - touchStartY;
            if (Math.abs(dy) > 30 && !isHeaderCollapsed) { setIsHeaderCollapsed(true); }
          }
        };
        const handleTouchEnd = () => { lastPinchDist.current = null; touchStartY = null; };
        const handleWheel = (e) => { 
            if (interactionMode >= 2) return;
            if (Math.abs(e.deltaY) > 10 && !isHeaderCollapsed) { setIsHeaderCollapsed(true); } 
            if (e.ctrlKey) setZoomModeIdx(0); // 如果使用者用滾輪縮放，解除適應狀態
        };
        
        el.addEventListener('touchstart', handleTouchStart, { passive: true });
        el.addEventListener('touchmove', handleTouchMove, { passive: false });
        el.addEventListener('touchend', handleTouchEnd);
        el.addEventListener('touchcancel', handleTouchEnd);
        el.addEventListener('wheel', handleWheel, { passive: true });

        return () => {
          el.removeEventListener('touchstart', handleTouchStart);
          el.removeEventListener('touchmove', handleTouchMove);
          el.removeEventListener('touchend', handleTouchEnd);
          el.removeEventListener('touchcancel', handleTouchEnd);
          el.removeEventListener('wheel', handleWheel);
        };
      }, [screen, isHeaderCollapsed, interactionMode]);

      // 定期清理過期的水波紋動畫
      useEffect(function() {
        if (ripples.length === 0) return;
        const timer = setTimeout(() => {
            const now = Date.now();
            setRipples(prev => prev.filter(r => now - r.timestamp < 1000));
        }, 1000);
        return () => clearTimeout(timer);
      }, [ripples]);

      const showToast = (m) => { setToastMsg(m); setTimeout(() => setToastMsg(""), 4000); };

      // === 游標與水波事件廣播與繪圖處理 ===
      const getSvgCoords = (clientX, clientY) => {
        const svg = svgRef.current;
        if (!svg) return null;
        let pt = svg.createSVGPoint();
        pt.x = clientX;
        pt.y = clientY;
        const ctm = svg.getScreenCTM();
        if (!ctm) return null;
        return pt.matrixTransform(ctm.inverse());
      };

      // 橡皮擦碰撞偵測邏輯
      const eraseAtPoint = (cx, cy) => {
          const offsets = [[0,0], [15,0], [-15,0], [0,15], [0,-15], [10,10], [-10,-10], [10,-10], [-10,10]];
          let hitIds = new Set();
          for (let off of offsets) {
              const els = document.elementsFromPoint(cx + off[0], cy + off[1]);
              for (let el of els) {
                  if (el.classList.contains('doodle-stroke')) {
                      const sid = el.getAttribute('data-stroke-id');
                      const strokeObj = stateRef.current.strokes.find(s => s.id === sid);
                      const strokeUid = (strokeObj && strokeObj.uid) || (strokeObj ? strokeObj.id.split('-')[1] : null);
                      // 雙重保險：只允許將「屬於自己」的筆跡加入刪除名單
                      if (strokeUid === myId) {
                          hitIds.add(sid);
                      }
                  }
              }
          }
          if (hitIds.size > 0) {
              const newStrokes = stateRef.current.strokes.filter(s => !hitIds.has(s.id));
              if (newStrokes.length !== stateRef.current.strokes.length) {
                  syncState({ strokes: newStrokes });
              }
          }
      };

      const handlePointerDown = (e) => {
        const pt = getSvgCoords(e.clientX, e.clientY);
        if (!pt) return;

        // 處理繪畫與橡皮擦模式
        if (interactionMode === 2) {
            e.target.setPointerCapture(e.pointerId);
            if (drawSubMode === 'pen') {
                isDrawingRef.current = true;
                // 新增明確記錄 uid，方便後續動態綁定顏色
                setCurrentPath({ id: Date.now() + '-' + myId, uid: myId, path: `M ${pt.x} ${pt.y}` });
            } else if (drawSubMode === 'eraser') {
                eraseAtPoint(e.clientX, e.clientY);
            }
            return;
        }

        if (engineRef.current !== 'peerjs' || !showOtherCursors) return;
        const msg = { type: 'CLICK', uid: myId, x: pt.x, y: pt.y };
        setRipples(prev => [...prev, { id: Date.now() + Math.random(), uid: myId, x: pt.x, y: pt.y, timestamp: Date.now() }]);
        
        if (isHostRef.current) {
            connsRef.current.forEach(c => c.send(msg));
        } else if (connRef.current) {
            connRef.current.send(msg);
        }
      };

      const handlePointerMove = (e) => {
        if (interactionMode === 2) {
            const pt = getSvgCoords(e.clientX, e.clientY);
            if (drawSubMode === 'eraser') {
                if (pt) setEraserPos({ x: pt.x, y: pt.y });
                if (e.buttons > 0 || e.pointerType === 'touch') {
                    eraseAtPoint(e.clientX, e.clientY);
                }
            } else if (drawSubMode === 'pen' && isDrawingRef.current && currentPath) {
                if (pt) setCurrentPath(prev => ({ ...prev, path: prev.path + ` L ${pt.x} ${pt.y}` }));
            }
            return;
        }

        if (engineRef.current !== 'peerjs' || !showOtherCursors) return;
        if (Date.now() - lastCursorSend.current < 50) return; 
        lastCursorSend.current = Date.now();
        const pt = getSvgCoords(e.clientX, e.clientY);
        if (pt) {
            const msg = { type: 'CURSOR', uid: myId, x: pt.x, y: pt.y };
            if (isHostRef.current) {
                connsRef.current.forEach(c => c.send(msg));
            } else if (connRef.current) {
                connRef.current.send(msg);
            }
        }
      };

      const handlePointerUp = (e) => {
        if (interactionMode === 2) {
            if (drawSubMode === 'pen' && isDrawingRef.current) {
                isDrawingRef.current = false;
                if (currentPath) {
                    const newStrokes = [...stateRef.current.strokes, currentPath];
                    syncState({ strokes: newStrokes });
                    setCurrentPath(null);
                }
            }
        }
      };

      // 快速清空繪圖
      const clearOwnStrokes = () => {
          const newStrokes = stateRef.current.strokes.filter(s => !s.id.endsWith('-' + myId));
          syncState({ strokes: newStrokes });
          showToast("🗑️ 已清除你所有的塗鴉");
      };

      const clearAllStrokes = () => {
          if (isHostRef.current) {
              syncState({ strokes: [] });
              showToast("🚨 房主已清空全場塗鴉");
          }
      };

      // 幽靈玩家點名清除機制
      const purgeGhostPlayers = () => {
        if (!isHostRef.current) return;
        setPlayersList(prev => {
          const hostPlayer = prev.find(p => p.id === myId);
          if (!hostPlayer) return prev;
          const newList = [hostPlayer]; // 瞬間清空只留房主
          
          if (engineRef.current === 'firebase' && roomRef.current) {
            updateDoc(roomRef.current, { players: newList }).catch(e => {});
          } else if (engineRef.current === 'peerjs') {
            connsRef.current = connsRef.current.filter(c => c.open);
            connsRef.current.forEach(c => c.send({ type: 'PLAYERS_UPDATE', players: newList }));
            connsRef.current.forEach(c => c.send({ type: 'REQ_REJOIN' }));
          }
          return newList;
        });
      };

      const syncState = (partial, shouldBroadcast = true) => {
        if (partial.bridges !== undefined) setBridges(partial.bridges);
        if (partial.showSolution !== undefined) setShowSolution(partial.showSolution);
        if (partial.randomLevelData !== undefined) setRandomLevelData(partial.randomLevelData);
        if (partial.startTime !== undefined) setStartTime(partial.startTime);
        if (partial.levelId !== undefined) setCurrentLevelId(partial.levelId);
        if (partial.strokes !== undefined) setStrokes(partial.strokes);
        
        const updatedState = { ...stateRef.current, ...partial };
        stateRef.current = updatedState;

        if (shouldBroadcast) {
            if (engineRef.current === 'firebase' && roomRef.current) {
              const safeState = JSON.parse(JSON.stringify(updatedState));
              updateDoc(roomRef.current, { "gameState": safeState, updatedAt: Date.now() }).catch(e => {});
            } else if (engineRef.current === 'peerjs') {
              if (isHostRef.current) {
                 connsRef.current.forEach(c => c.send({ type: 'SYNC', data: updatedState }));
              } else if (connRef.current) {
                 connRef.current.send({ type: 'SYNC', data: updatedState });
              }
            }
        }
      };

      // 橋樑點擊與防呆
      const handleBridgeClick = (bId) => {
        if (isWon || interactionMode >= 2) return;
        const cur = bridges || [];
        const target = cur.find(b => b.id === bId);
        if (!target) return;
        
        if (target.count + (target.draftCount || 0) === 0) {
          const islandsMap = {};
          const cLevel = randomLevelData || { islands: [] };
          (cLevel.islands || []).forEach(i => { islandsMap[i.id] = i; });
          const tFrom = islandsMap[target.from], tTo = islandsMap[target.to];
          let isCross = false;
          if (tFrom && tTo) {
            if (target.type === 'h') {
              const y = tFrom.y, minX = Math.min(tFrom.x, tTo.x), maxX = Math.max(tFrom.x, tTo.x);
              for (let i=0; i<cur.length; i++) {
                let b = cur[i];
                if ((b.count + (b.draftCount || 0)) > 0 && b.type === 'v') {
                  const bFrom = islandsMap[b.from], bTo = islandsMap[b.to];
                  if (bFrom && bTo && bFrom.x > minX && bFrom.x < maxX && y > Math.min(bFrom.y, bTo.y) && y < Math.max(bFrom.y, bTo.y)) isCross = true;
                }
              }
            } else {
              const x = tFrom.x, minY = Math.min(tFrom.y, tTo.y), maxY = Math.max(tFrom.y, tTo.y);
              for (let i=0; i<cur.length; i++) {
                let b = cur[i];
                if ((b.count + (b.draftCount || 0)) > 0 && b.type === 'h') {
                  const bFrom = islandsMap[b.from], bTo = islandsMap[b.to];
                  if (bFrom && bTo && bFrom.y > minY && bFrom.y < maxY && x > Math.min(bFrom.x, bTo.x) && x < Math.max(bFrom.x, bTo.x)) isCross = true;
                }
              }
            }
          }
          if (isCross) return showToast("🚫 橋樑不能交叉喔！請先移除阻擋的橋。");
        }

        if (engineRef.current === 'none') setHistory(past => [...past, cur]);
        
        const nextBridges = cur.map(b => { 
            if (b.id !== bId) return b;
            
            let newCount = b.count;
            let newDraftCount = b.draftCount || 0;
            
            if (interactionMode === 1) { // 草稿模式
               if (b.count === 1) {
                  newDraftCount = newDraftCount === 0 ? 1 : 0;
               } else if (b.count === 0) {
                  newDraftCount = (newDraftCount + 1) % 3;
               }
            } else { // 實線模式
               if (newDraftCount > 0) {
                  newCount = b.count + newDraftCount;
                  newDraftCount = 0;
               } else {
                  newCount = (b.count + 1) % 3;
               }
            }

            const newOwner = (newCount > 0 || newDraftCount > 0) ? myId : null;
            return { ...b, count: newCount, draftCount: newDraftCount, owner: newOwner }; 
        });
        syncState({ bridges: nextBridges });
      };

      const toggleInteractionMode = () => {
        const maxModes = engineRef.current === 'peerjs' ? 3 : 2;
        const nextMode = (interactionMode + 1) % maxModes;
        setInteractionMode(nextMode);
        showToast(`${modeIcons[nextMode]} 已切換為 ${modeTitles[nextMode]}`);
      };

      const handleUndo = () => {
        if (history.length === 0 || isWon || engineRef.current !== 'none') return;
        const previousState = history[history.length - 1];
        syncState({ bridges: previousState });
        setHistory(past => past.slice(0, -1));
      };

      const handleReset = () => {
        const empty = generateEmptyBridges(randomLevelData);
        syncState({ bridges: empty, strokes: [], showSolution: false, startTime: Date.now() });
        if (engineRef.current === 'none') setHistory([]);
        setIsWon(false); setElapsedTime(0);
      };

      const handleRegenerateRandom = () => {
        setIsGenerating(true);
        setTimeout(() => {
            purgeGhostPlayers();
            let targetLevelDef;
            if (currentLevelId === 'custom') {
               targetLevelDef = { id: 'custom', name: `⚙️ 自訂 (${randomLevelData.width}x${randomLevelData.height})`, width: randomLevelData.width, height: randomLevelData.height, description: "玩家自訂尺寸的大型地圖！" };
            } else {
               targetLevelDef = LEVELS.find(l => l.id === currentLevelId) || LEVELS[1];
            }
            const newRandomData = generateRandomHashi(targetLevelDef);
            const empty = generateEmptyBridges(newRandomData);
            syncState({ levelId: currentLevelId, randomLevelData: newRandomData, bridges: empty, strokes: [], showSolution: false, startTime: Date.now() });
            setIsWon(false); setHistory([]); setElapsedTime(0); setHideVictoryModal(false);
            setIsGenerating(false);
        }, 100);
      };

      const handleLevelChange = (newLevelId) => {
        if (engineRef.current !== 'none' && !isHostRef.current) return;
        
        if (newLevelId === 'custom') {
            setShowCustomModal(true);
            return; 
        }

        setIsGenerating(true);
        setTimeout(() => {
            purgeGhostPlayers();
            const targetLevelDef = LEVELS.find(l => l.id === newLevelId);
            if(!targetLevelDef) {
                setIsGenerating(false);
                return;
            }
            const newRandomData = generateRandomHashi(targetLevelDef);
            const empty = generateEmptyBridges(newRandomData);
            syncState({ levelId: newLevelId, randomLevelData: newRandomData, bridges: empty, strokes: [], showSolution: false, startTime: Date.now() });
            setIsWon(false); setHistory([]); setZoomLevel(1); setZoomModeIdx(0); setElapsedTime(0);
            setIsGenerating(false);
        }, 100);
      };

      const handleCustomGenerate = () => {
          let w = Math.max(5, Math.min(100, tempWidth));
          let h = Math.max(5, Math.min(100, tempHeight));
          setTempWidth(w);
          setTempHeight(h);
          setShowCustomModal(false);
          
          setIsGenerating(true);
          setTimeout(() => {
              purgeGhostPlayers();
              const customLevelDef = { id: 'custom', name: `⚙️ 自訂 (${w}x${h})`, width: w, height: h, description: "玩家自訂尺寸的大型地圖！" };
              const newRandomData = generateRandomHashi(customLevelDef);
              const empty = generateEmptyBridges(newRandomData);
              
              syncState({ levelId: 'custom', randomLevelData: newRandomData, bridges: empty, strokes: [], showSolution: false, startTime: Date.now() });
              setIsWon(false); setHistory([]); setZoomLevel(1); setZoomModeIdx(0); setElapsedTime(0);
              setIsGenerating(false);
          }, 100);
      };

      const handleShowSolution = () => { syncState({ showSolution: true }); };

      const closeVictoryModal = () => {
        setIsClosingModal(true);
        setTimeout(() => {
          setHideVictoryModal(true);
          setIsClosingModal(false);
        }, 300);
      };

      const triggerRegenerate = () => {
        setIsClosingModal(true);
        setTimeout(() => {
          setIsClosingModal(false);
          handleRegenerateRandom();
        }, 300);
      };

      const switchToOffline = () => {
        if (unsubRef.current) { unsubRef.current(); unsubRef.current = null; }
        if (peerRef.current) { peerRef.current.destroy(); peerRef.current = null; }
        setEngine('none'); engineRef.current = 'none';
        setIsHost(false); isHostRef.current = false;
        setRoomId(""); setPlayersList([]);
        roomRef.current = null; connsRef.current = []; connRef.current = null;
        setCursors({}); setRipples([]); setInteractionMode(0);
      };

      const startSinglePlayer = () => {
        switchToOffline(); setScreen('game'); handleReset(); setIsHeaderCollapsed(false);
      };

      const initiateHostGame = () => {
        const pName = tempPlayerName.trim();
        if (!pName) return showToast("⚠️ 請先設定顯示暱稱");
        
        setIsConnecting(true); 
        const rId = Math.floor(1000 + Math.random() * 9000).toString();
        const finalId = stableMode ? "S" + rId : rId;
        
        if (stableMode) { 
           setEngine('firebase'); engineRef.current = 'firebase'; 
           setupFirebase(finalId, pName, true); 
        } else { 
           setEngine('peerjs'); engineRef.current = 'peerjs'; 
           setupPeerJS(finalId, pName, true); 
        }
      };

      const joinExistingGame = () => {
        const pName = tempPlayerName.trim();
        const rId = tempRoomId.trim().toUpperCase();
        if (!pName || !rId) return showToast("⚠️ 請完整輸入暱稱與代碼");
        
        setIsConnecting(true); 
        if (/^[a-zA-Z]/.test(rId)) { 
           setEngine('firebase'); engineRef.current = 'firebase'; 
           setupFirebase(rId, pName, false); 
        } else { 
           setEngine('peerjs'); engineRef.current = 'peerjs'; 
           setupPeerJS(rId, pName, false); 
        }
      };

      const setupFirebase = async (rId, pName, isCreating) => {
        if (authError) { setIsConnecting(false); return showToast("⚠️ Firebase 設定錯誤: " + authError + " (請確認已開啟 Anonymous 匿名登入)"); }
        if (!user) { setIsConnecting(false); return showToast("⚠️ 伺服器連線中，請稍後"); }
        
        const safeAppId = typeof __app_id !== 'undefined' && __app_id ? __app_id : 'default-app-id';
        const rDoc = doc(db, 'artifacts', safeAppId, 'public', 'data', 'rooms', rId);
        roomRef.current = rDoc;

        const timeout = (ms) => new Promise((_, reject) => setTimeout(() => reject(new Error("TIMEOUT")), ms));

        try {
          if (isCreating) {
            setIsHost(true); isHostRef.current = true;
            const safeState = JSON.parse(JSON.stringify(stateRef.current));
            const initialColor = getAvailableColor([]);
            await Promise.race([
                setDoc(rDoc, { hostId: myId, players: [{id: myId, name: pName, isHost: true, color: initialColor}], gameState: safeState, updatedAt: Date.now() }),
                timeout(6000)
            ]);
          } else {
            const snap = await Promise.race([getDoc(rDoc), timeout(6000)]);
            if (!snap.exists()) { setIsConnecting(false); switchToOffline(); return showToast("⚠️ 找不到該對局大廳，請確認代碼"); }
            setIsHost(false); isHostRef.current = false;
            let pList = snap.data().players || [];
            if (!pList.find(p => p.id === myId)) {
              pList.push({ id: myId, name: pName, isHost: false, color: getAvailableColor(pList) });
              await Promise.race([updateDoc(rDoc, { players: pList, updatedAt: Date.now() }), timeout(6000)]);
            }
          }
          setRoomId(rId); setScreen('game'); setIsHeaderCollapsed(false); setIsConnecting(false);

          unsubRef.current = onSnapshot(rDoc, function(docSnap) {
            if (!docSnap.exists()) { 
               showToast("⚠️ 房主已斷線，切換為單機模式"); 
               switchToOffline(); return; 
            }
            const data = docSnap.data();
            const serverPlayers = data.players || [];
            setPlayersList(serverPlayers);

            if (!isHostRef.current && !serverPlayers.find(p => p.id === myId)) {
                const updatedPList = [...serverPlayers, { id: myId, name: myNameRef.current, isHost: false, color: myColorRef.current }];
                updateDoc(rDoc, { players: updatedPList }).catch(e => {});
            }

            if (data.gameState) {
              const gs = data.gameState;
              if (gs.bridges) setBridges(gs.bridges);
              if (gs.randomLevelData) setRandomLevelData(gs.randomLevelData);
              if (gs.levelId !== undefined) setCurrentLevelId(gs.levelId);
              if (gs.showSolution !== undefined) setShowSolution(gs.showSolution);
              if (gs.startTime) setStartTime(gs.startTime);
              if (gs.strokes !== undefined) setStrokes(gs.strokes);
              stateRef.current = gs;
            }
          }, function(err) { showToast("⚠️ 網路波動，同步中..."); });
        } catch(e) { 
            setIsConnecting(false); switchToOffline();
            if (e.message === "TIMEOUT") showToast("⚠️ 連線逾時！請確認 Firebase 後台已開放 Firestore 讀寫權限");
            else showToast("⚠️ 雲端連線失敗，請檢查網路或權限");
        }
      };

      const setupPeerJS = (rId, pName, isCreating) => {
        if (isCreating) {
            const p = new Peer(rId + '-host');
            peerRef.current = p;
            p.on('open', function() {
              setIsHost(true); isHostRef.current = true;
              setRoomId(rId); setScreen('game'); setIsHeaderCollapsed(false); setIsConnecting(false);
              setPlayersList([{ id: myId, name: pName, isHost: true, color: getAvailableColor([]) }]);
              
              p.on('connection', function(c) {
                connsRef.current.push(c);
                c.on('data', function(m) {
                  if (m.type === 'JOIN') {
                      setPlayersList(prev => {
                          if(prev.find(pl => pl.id===m.uid)) return prev;
                          const newColor = m.color || getAvailableColor(prev);
                          const nList = [...prev, { id: m.uid, name: m.pName, isHost: false, color: newColor }];
                          connsRef.current.forEach(conn => conn.send({ type: 'INIT', data: stateRef.current, players: nList }));
                          connsRef.current.forEach(conn => conn.send({ type: 'PLAYERS_UPDATE', players: nList }));
                          return nList;
                      });
                  } else if (m.type === 'SYNC') {
                      syncState(m.data, false);
                      connsRef.current.forEach(conn => { if(conn.peer !== c.peer) conn.send({ type: 'SYNC', data: m.data }); });
                  } else if (m.type === 'REQ_COLOR_CHANGE') {
                      setPlayersList(prev => {
                          const nList = prev.map(pl => {
                              if (pl.id === m.targetId) return { ...pl, color: m.color };
                              return pl;
                          });
                          connsRef.current.forEach(conn => conn.send({ type: 'PLAYERS_UPDATE', players: nList }));
                          return nList;
                      });
                  } else if (m.type === 'CURSOR') {
                      connsRef.current.forEach(conn => { if(conn.peer !== c.peer) conn.send(m); });
                      setCursors(prev => ({ ...prev, [m.uid]: { x: m.x, y: m.y } }));
                  } else if (m.type === 'CLICK') {
                      connsRef.current.forEach(conn => { if(conn.peer !== c.peer) conn.send(m); });
                      setRipples(prev => [...prev, { id: Date.now() + Math.random(), uid: m.uid, x: m.x, y: m.y, timestamp: Date.now() }]);
                  }
                });
                c.on('close', function() {
                    connsRef.current = connsRef.current.filter(conn => conn.peer !== c.peer);
                });
              });
            });
            p.on('error', function() { setIsConnecting(false); switchToOffline(); showToast("⚠️ 無法建立對局大廳，請重試"); });
        } else {
            const guestP = new Peer();
            peerRef.current = guestP;
            guestP.on('open', function() {
                const c = guestP.connect(rId + '-host');
                connRef.current = c;
                c.on('open', function() { 
                  setIsHost(false); isHostRef.current = false;
                  setRoomId(rId); setScreen('game'); setIsHeaderCollapsed(false); setIsConnecting(false);
                  c.send({ type: 'JOIN', pName: pName, uid: myId });
                });
                c.on('data', function(m) {
                  if (m.type === 'INIT') {
                      if (m.players) setPlayersList(m.players);
                      if (m.data) syncState(m.data, false);
                  } else if (m.type === 'SYNC') {
                      syncState(m.data, false);
                  } else if (m.type === 'PLAYERS_UPDATE') {
                      if (m.players) setPlayersList(m.players);
                  } else if (m.type === 'CURSOR') {
                      setCursors(prev => ({ ...prev, [m.uid]: { x: m.x, y: m.y } }));
                  } else if (m.type === 'CLICK') {
                      setRipples(prev => [...prev, { id: Date.now() + Math.random(), uid: m.uid, x: m.x, y: m.y, timestamp: Date.now() }]);
                  } else if (m.type === 'REQ_REJOIN') {
                      connRef.current.send({ type: 'JOIN', pName: myNameRef.current, uid: myId, color: myColorRef.current });
                  }
                });
                c.on('close', function() { showToast("⚠️ 主機已離線，切換為單機模式"); switchToOffline(); });
            });
            guestP.on('error', function() { setIsConnecting(false); switchToOffline(); showToast("⚠️ 無法連線，請確認代碼是否正確"); });
        }
      };

      const handleGoHome = () => {
        if (engineRef.current !== 'none') {
            if (unsubRef.current) unsubRef.current();
            if (isHostRef.current && engineRef.current === 'firebase' && roomRef.current) {
               deleteDoc(roomRef.current).catch(e => {});
            } else if (!isHostRef.current && engineRef.current === 'firebase' && roomRef.current) {
               const updatedPlayers = playersList.filter(p => p.id !== myId);
               updateDoc(roomRef.current, { players: updatedPlayers }).catch(e => {});
            }
            if (peerRef.current) peerRef.current.destroy();
        }
        switchToOffline(); setScreen('home'); setIsWon(false); setElapsedTime(0); setHistory([]);
      };

      const handlePlayerColorChange = (playerId, newColor) => {
        if (engineRef.current === 'none') return;
        
        if (engineRef.current === 'firebase' && roomRef.current) {
            const updatedPlayers = playersList.map(p => { 
                if (p.id === playerId) return { ...p, color: newColor }; 
                return p; 
            });
            setPlayersList(updatedPlayers);
            updateDoc(roomRef.current, { players: updatedPlayers }).catch(e => {});
        } else if (engineRef.current === 'peerjs') {
            if (isHostRef.current) {
                setPlayersList(prev => {
                    const nList = prev.map(p => {
                        if (p.id === playerId) return { ...p, color: newColor };
                        return p;
                    });
                    connsRef.current.forEach(c => c.send({ type: 'PLAYERS_UPDATE', players: nList }));
                    return nList;
                });
            } else if (connRef.current) {
                connRef.current.send({ type: 'REQ_COLOR_CHANGE', targetId: playerId, color: newColor });
            }
        }
      };

      const islandCurrentCounts = useMemo(function() {
        const counts = {};
        const islands = (randomLevelData && randomLevelData.islands) ? randomLevelData.islands : [];
        islands.forEach(i => { counts[i.id] = { total: 0, real: 0 }; });
        (bridges || []).forEach(b => {
          if (counts[b.from] !== undefined) {
             counts[b.from].total += b.count + (b.draftCount || 0);
             counts[b.from].real += b.count;
          }
          if (counts[b.to] !== undefined) {
             counts[b.to].total += b.count + (b.draftCount || 0);
             counts[b.to].real += b.count;
          }
        });
        return counts;
      }, [bridges, randomLevelData]);

      useEffect(function() {
        const islands = (randomLevelData && randomLevelData.islands) ? randomLevelData.islands : [];
        if (islands.length === 0) { if (isWon) setIsWon(false); return; }
        
        let allCountsMatch = true;
        for (let i=0; i<islands.length; i++) { 
           if (islandCurrentCounts[islands[i].id].real !== islands[i].req) { allCountsMatch = false; break; } 
        }
        if (!allCountsMatch) { if (isWon) setIsWon(false); return; }
        
        const adjList = {}; islands.forEach(i => { adjList[i.id] = []; });
        (bridges || []).forEach(b => { 
           if (b.count > 0 && adjList[b.from] && adjList[b.to]) { 
               adjList[b.from].push(b.to); adjList[b.to].push(b.from); 
           } 
        });
        const visited = new Set(); const queue = [islands[0].id];
        if (queue.length > 0) visited.add(queue[0]);
        while (queue.length > 0) {
          const curr = queue.shift();
          if (adjList[curr]) {
            adjList[curr].forEach(neighbor => { if (!visited.has(neighbor)) { visited.add(neighbor); queue.push(neighbor); } });
          }
        }
        if (visited.size === islands.length && islands.length > 0) { if (!isWon) { setIsWon(true); setHideVictoryModal(false); } } 
        else { setIsWon(false); }
      }, [bridges, randomLevelData, islandCurrentCounts, isWon]);

      const handleSaveCode = () => {
        const saveData = { 
            lid: currentLevelId, 
            r: randomLevelData, 
            b: (bridges || []).filter(br => br.count > 0 || (br.draftCount || 0) > 0).map(br => ({ i: br.id, c: br.count, d: br.draftCount || 0, o: br.owner })),
            s: strokes
        };
        const code = btoa(encodeURIComponent(JSON.stringify(saveData)));
        setSaveCode(code);
        const textArea = document.createElement("textarea"); textArea.value = code; document.body.appendChild(textArea); textArea.select();
        try { document.execCommand('copy'); showToast("✅ 已產生並複製代碼！"); } catch (err) {}
        document.body.removeChild(textArea);
      };
      
      const handleQuickPaste = async () => {
        try { if (navigator.clipboard && navigator.clipboard.readText) { const text = await navigator.clipboard.readText(); if(text) { setSaveCode(text); showToast("✅ 貼上成功！"); } } else { throw new Error(); } } 
        catch (err) { const ta = document.getElementById("saveCodeTextarea"); if (ta) ta.focus(); showToast("⚠️ 瀏覽器阻擋自動貼上，請手動貼上"); }
      };
      
      const handleLoadCode = () => {
        try {
          if (!saveCode.trim()) return showToast("⚠️ 請貼上代碼");
          const data = JSON.parse(decodeURIComponent(atob(saveCode.trim())));
          
          let baseLevel, newRandom;
          if (data.lid === 'custom') {
              baseLevel = { id: 'custom', name: `⚙️ 自訂尺寸`, islands: (data.r && data.r.islands) ? data.r.islands : [] };
              newRandom = data.r;
          } else {
              baseLevel = LEVELS.find(l => l.id === data.lid);
              if (!baseLevel) return showToast("⚠️ 無效的代碼");
              newRandom = data.r;
          }

          const islandsToUse = newRandom && newRandom.islands ? newRandom.islands : baseLevel.islands;
          const emptyBridges = generateEmptyBridges({ islands: islandsToUse });
          
          data.b.forEach(savedBr => { let tb = emptyBridges.find(eb => eb.id === savedBr.i); if (tb) { tb.count = savedBr.c || 0; tb.draftCount = savedBr.d || 0; tb.owner = savedBr.o; } });
          setCurrentLevelId(data.lid);
          syncState({ randomLevelData: newRandom, bridges: emptyBridges, strokes: data.s || [], showSolution: false });
          setIsWon(false); setShowSaveModal(false); showToast("✅ 讀取成功！");
        } catch(e) { showToast("⚠️ 讀檔失敗！"); }
      };

      const handleZoomIn = () => { setZoomLevel(prev => Math.min(prev + 0.3, 3.5)); setZoomModeIdx(0); };
      const handleZoomOut = () => { setZoomLevel(prev => Math.max(prev - 0.3, 0.4)); setZoomModeIdx(0); };
      const handleZoomReset = () => { setZoomLevel(1); setZoomModeIdx(0); };

      const handleCycleZoom = () => {
        const nextIdx = (zoomModeIdx + 1) % 4;
        setZoomModeIdx(nextIdx);

        const container = zoomContainerRef.current;
        if (!container) return;

        const paddingFactor = 0.95; 
        const cw = container.clientWidth;
        const ch = container.clientHeight;

        let newZoom = 1;
        if (nextIdx === 0) {
          newZoom = 1;
          showToast("🔍 原始大小 (1x)");
        } else if (nextIdx === 1) {
          newZoom = (cw / svgW) * paddingFactor;
          showToast("↔️ 適應螢幕寬度");
        } else if (nextIdx === 2) {
          newZoom = (ch / svgH) * paddingFactor;
          showToast("↕️ 適應螢幕長度");
        } else if (nextIdx === 3) {
          newZoom = Math.min(cw / svgW, ch / svgH) * paddingFactor;
          showToast("🔲 長寬自動適應");
        }
        setZoomLevel(Math.min(Math.max(newZoom, 0.2), 3.5));
      };

      if (screen === 'home') {
        return (
          <div className="h-screen w-screen flex flex-col items-center justify-center p-4 relative overflow-hidden animate-fadeIn">
            <div className="flex-1 flex flex-col justify-center w-full max-w-md items-center">
              <div className="bg-[#fffaf0] border-4 border-slate-800 p-10 rounded-xl shadow-[8px_8px_0px_rgba(30,41,59,1)] w-full text-center relative transform -rotate-1 z-10">
                 <h1 className="text-6xl font-black text-slate-800 mb-6 tracking-widest flex justify-center gap-3">
                    <span className="inline-block bg-[#ffcc00] px-4 py-2 border-4 border-slate-800 rounded-xl transform rotate-3 shadow-[4px_4px_0px_rgba(30,41,59,1)]">數</span>
                    <span className="inline-block bg-[#ffcc00] px-4 py-2 border-4 border-slate-800 rounded-xl transform -rotate-2 shadow-[4px_4px_0px_rgba(30,41,59,1)]">橋</span>
                 </h1>
                 <div className="inline-block border-[3px] border-dashed border-slate-800 rounded-xl px-6 py-2 mb-8 bg-white shadow-[4px_4px_0px_rgba(30,41,59,1)] transform rotate-2">
                    <p className="text-slate-800 font-black text-xl tracking-widest uppercase italic">Hashi Puzzle</p>
                 </div>
                 <div className="flex flex-col gap-5">
                    <button onClick={startSinglePlayer} className="w-full py-4 bg-white border-4 border-slate-800 rounded-xl font-black text-xl text-slate-800 shadow-[4px_4px_0px_rgba(30,41,59,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_rgba(30,41,59,1)] transition-all transform rotate-1">👤 單機挑戰</button>
                    <button onClick={() => setScreen('join')} className="w-full py-4 bg-emerald-400 border-4 border-slate-800 rounded-xl font-black text-xl text-slate-900 shadow-[4px_4px_0px_rgba(30,41,59,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_rgba(30,41,59,1)] transition-all transform -rotate-1">🌐 多人合作</button>
                 </div>
              </div>
            </div>
            <div className="shrink-0 pb-4 text-slate-800 font-black text-sm opacity-60 tracking-wider z-10">Copyright © 2026 葉大帥. All rights reserved. (v1.4)</div>
          </div>
        );
      }

      if (screen === 'join') {
        return (
          <div className="h-screen w-screen flex flex-col items-center justify-center p-4 relative animate-fadeIn">
            <div className="bg-[#fffaf0] border-4 border-slate-800 p-8 rounded-xl shadow-[10px_10px_0px_rgba(30,41,59,1)] max-w-2xl w-full z-10 transform rotate-1">
              <h2 onClick={() => {
                const newClicks = titleClicks + 1;
                if (newClicks >= 3) {
                  setStableMode(!stableMode);
                  setTitleClicks(0);
                } else {
                  setTitleClicks(newClicks);
                }
              }} className="text-2xl font-black text-slate-800 mb-6 inline-block border-b-4 border-[#ffcc00] pb-1 cursor-pointer select-none">🌐 多人連線選單</h2>
              
              <div className="mb-6 bg-white p-4 rounded-lg border-2 border-slate-800 shadow-[4px_4px_0px_rgba(30,41,59,1)]">
                <label className="block text-slate-800 font-black text-sm mb-2">第一步：設定顯示暱稱</label>
                <input type="text" placeholder="例如：王小明" value={tempPlayerName} onChange={(e) => setTempPlayerName(e.target.value)} disabled={isConnecting} className="w-full border-2 border-slate-800 rounded-md p-3 font-bold bg-yellow-50 outline-none focus:ring-2 ring-[#ffcc00] disabled:opacity-50" />
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div className="border-t-4 md:border-t-0 md:border-r-4 border-dashed border-slate-300 pt-4 md:pt-0 md:pr-6 flex flex-col h-full">
                   <h3 className="font-black text-lg mb-2 flex items-center gap-2 text-slate-800">👑 建立對局大廳</h3>
                   <p className="text-xs text-slate-600 mb-4 font-bold leading-relaxed">擔任對局主機，系統會自動分派一組邀請碼供其他玩家加入。</p>
                   <div className="mt-auto">
                     {stableMode && <div className="text-xs font-black text-emerald-600 mb-2 animate-pulse">✓ 雲端模式準備就緒</div>}
                     <button onClick={initiateHostGame} disabled={isConnecting} className="w-full py-3 bg-blue-500 text-white border-4 border-slate-800 rounded-xl font-black shadow-[4px_4px_0px_rgba(30,41,59,1)] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_rgba(30,41,59,1)] transition-all disabled:opacity-50 disabled:cursor-not-allowed uppercase">
                       {isConnecting ? "建立中..." : "發起多人對局"}
                     </button>
                   </div>
                </div>

                <div className="pt-4 md:pt-0 flex flex-col h-full">
                   <h3 className="font-black text-lg mb-2 flex items-center gap-2 text-slate-800">👤 參與現有對局</h3>
                   <p className="text-xs text-slate-600 mb-2 font-bold leading-relaxed">請輸入主機分派的 4 碼邀請碼：</p>
                   <input type="text" maxLength="5" placeholder="邀請碼" value={tempRoomId} onChange={(e) => setTempRoomId(e.target.value.toUpperCase())} disabled={isConnecting} className="w-full border-4 border-slate-800 rounded-xl p-3 font-black text-center text-2xl mb-4 tracking-widest outline-none bg-emerald-50 uppercase shadow-[4px_4px_0px_rgba(30,41,59,1)] disabled:opacity-50" />
                   <button onClick={joinExistingGame} disabled={isConnecting} className="w-full py-3 bg-emerald-400 text-slate-900 border-4 border-slate-800 rounded-xl font-black shadow-[4px_4px_0px_rgba(30,41,59,1)] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_rgba(30,41,59,1)] transition-all mt-auto disabled:opacity-50 disabled:cursor-not-allowed uppercase">
                     {isConnecting ? "加入中..." : "參與對局連線"}
                   </button>
                </div>
              </div>

              <button onClick={() => setScreen('home')} disabled={isConnecting} className="mt-8 w-full text-slate-400 font-bold hover:text-slate-800 hover:underline text-center transition-colors disabled:opacity-50">取消返回主選單</button>
            </div>
            {toastMsg && <div className="fixed top-10 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full font-bold shadow-[0_4px_10px_rgba(0,0,0,0.3)] z-[100] border-[3px] border-white animate-slideUpFade">{toastMsg}</div>}
          </div>
        );
      }

      return (
        <div className="h-screen w-screen p-1 md:p-4 flex flex-col items-center font-sans relative" style={{ backgroundColor: '#fdf5e6', backgroundImage: 'radial-gradient(#d3c5ab 2px, transparent 2px)', backgroundSize: '12px 12px' }}>
          <div className="w-full max-w-[1200px] bg-[#fffaf0] rounded-xl border-4 border-slate-800 shadow-[8px_8px_0px_rgba(30,41,59,1)] flex flex-col h-full relative z-10 overflow-hidden">
            
            <div className={`bg-[#ffcc00] border-b-4 border-slate-800 shrink-0 z-50 relative transition-all duration-300 ease-in-out px-2 md:px-4 py-2 flex flex-col gap-2`}>
               <div className="flex items-center justify-between gap-1 w-full">
                  <div className="flex items-center gap-2 flex-wrap">
                     <h1 className="font-black tracking-tight uppercase text-lg md:text-2xl text-[#2d2a26] flex items-center gap-1">🌉<span className="hidden sm:inline">數橋</span></h1>
                     <div className="flex items-center gap-1 bg-[#2d2a26] text-white px-2 py-1 rounded-md font-mono font-bold shadow-[2px_2px_0px_rgba(0,0,0,0.4)] text-xs md:text-sm whitespace-nowrap">⏱ {formatTime(elapsedTime)}</div>
                     {isMultiplayer && ( <span className="bg-emerald-400 text-slate-900 px-2 py-1 rounded-md border-2 border-slate-800 font-black text-xs md:text-sm shadow-[2px_2px_0px_rgba(30,41,59,1)] flex items-center gap-1 whitespace-nowrap">{isHostRef.current ? '👑 主機' : '👤 玩家'} | 代碼: {roomId} {engineRef.current === 'firebase' && '☁️'}</span> )}
                  </div>
                  <button onClick={() => setIsHeaderCollapsed(!isHeaderCollapsed)} className="flex px-2 md:px-3 py-1 bg-[#2d2a26] text-white border-2 border-[#2d2a26] rounded-md font-bold text-xs md:text-sm shadow-[2px_2px_0px_rgba(0,0,0,0.3)] hover:bg-slate-800 items-center gap-1 whitespace-nowrap">{isHeaderCollapsed ? '🔽 展開規則' : '🔼 縮小面板'}</button>
               </div>

               <div className={`w-full overflow-hidden transition-all duration-500 ease-in-out origin-top flex flex-col gap-2 ${isHeaderCollapsed ? 'max-h-0 opacity-0 scale-y-95' : 'max-h-[500px] opacity-100 scale-y-100'}`}>
                  <div className="bg-white border-[3px] border-[#2d2a26] rounded-xl p-3 text-[#2d2a26] shadow-[4px_4px_0px_#2d2a26] flex flex-col md:flex-row gap-3">
                     <div className="flex-1">
                        <h3 className="text-sm md:text-base font-black mb-1 border-b-[3px] border-[#ffcc00] inline-block pb-0.5">📜 遊戲四大規則</h3>
                        <ol className="list-decimal list-outside ml-4 space-y-1 text-xs md:text-sm leading-relaxed font-bold">
                           <li>每個圓圈是一座「島」，數字代表需要幾座橋樑。</li>
                           <li>橋樑必須是垂直或水平方向。</li>
                           <li>橋樑之間絕對不能交叉或重疊。</li>
                           <li>兩座島之間最多架設 2 座橋，且完成時所有島嶼必須全部連通。</li>
                        </ol>
                     </div>
                     <div className="md:w-1/3 bg-[#ffcc00]/20 p-2 md:p-3 rounded-xl border-[3px] border-dashed border-[#2d2a26] flex flex-col justify-center">
                        <p className="text-[#2d2a26] font-black text-xs md:text-sm mb-1 flex items-center gap-1"><span>💡</span> 提示與狀態：</p>
                        <p className="text-slate-700 text-xs md:text-sm font-bold leading-relaxed">{cLevel.description}</p>
                     </div>
                  </div>
               </div>

               <div className="flex flex-wrap gap-1.5 items-center justify-between w-full">
                  <select disabled={isMultiplayer && !isHostRef.current} value={currentLevelId} onChange={(e) => {
                      const val = e.target.value;
                      handleLevelChange(val === 'custom' ? 'custom' : Number(val));
                  }} className="px-1 py-1 md:px-2 md:py-1.5 rounded-md border-2 border-[#2d2a26] font-bold bg-white text-[#2d2a26] text-xs md:text-sm outline-none shadow-[2px_2px_0px_#2d2a26] w-auto cursor-pointer max-w-[150px] sm:max-w-none truncate disabled:opacity-60 disabled:cursor-not-allowed">
                     {LEVELS.map(level => {
                         const isCustomActive = (level.id === 'custom' && currentLevelId === 'custom' && randomLevelData);
                         const displayName = isCustomActive 
                             ? `⚙️ 自訂 (${randomLevelData.width}x${randomLevelData.height})` 
                             : level.name;
                         return <option key={level.id} value={level.id}>{displayName}</option>;
                     })}
                  </select>
                  
                  <div className="flex gap-1 md:gap-2 flex-wrap items-center ml-auto">
                     {!isWon && hasSolution && !showSolution && ( <button onClick={handleShowSolution} className="px-2 py-1 md:px-3 md:py-1.5 bg-yellow-400 text-[#2d2a26] border-2 border-[#2d2a26] rounded-md font-bold text-xs md:text-sm shadow-[2px_2px_0px_#2d2a26] active:translate-y-1 active:shadow-none transition-all flex items-center gap-1" title="解答">💡<span className="hidden sm:inline">解答</span></button> )}
                     <button onClick={handleRegenerateRandom} className="px-2 py-1 md:px-3 md:py-1.5 bg-blue-500 text-white border-2 border-[#2d2a26] rounded-md font-bold text-xs md:text-sm shadow-[2px_2px_0px_#2d2a26] active:translate-y-1 active:shadow-none transition-all flex items-center gap-1" title="新題">🎲<span className="hidden sm:inline">新題</span></button>
                     {!isMultiplayer && ( <button onClick={handleUndo} disabled={history.length === 0 || isWon} className="px-2 py-1 md:px-3 md:py-1.5 bg-white border-2 border-[#2d2a26] rounded-md font-bold text-xs md:text-sm shadow-[2px_2px_0px_#2d2a26] disabled:opacity-50 disabled:shadow-none active:translate-y-1 active:shadow-none transition-all flex items-center gap-1 text-[#2d2a26]" title="復原">↩️<span className="hidden sm:inline">復原</span></button> )}
                     <button onClick={handleReset} className="px-2 py-1 md:px-3 md:py-1.5 bg-red-500 text-white border-2 border-[#2d2a26] rounded-md font-bold text-xs md:text-sm shadow-[2px_2px_0px_#2d2a26] active:translate-y-1 active:shadow-none transition-all flex items-center gap-1" title="重置">🔄<span className="hidden sm:inline">重置</span></button>
                     <button onClick={() => setShowSaveModal(true)} className="px-2 py-1 md:px-3 md:py-1.5 bg-blue-500 text-white border-2 border-[#2d2a26] rounded-md font-bold text-xs md:text-sm shadow-[2px_2px_0px_#2d2a26] active:translate-y-1 active:shadow-none transition-all flex items-center gap-1" title="存檔/讀檔">💾<span className="hidden sm:inline">存檔</span></button>
                     <button onClick={handleGoHome} className="bg-white text-[#2d2a26] border-2 border-[#2d2a26] px-2 py-1 md:px-3 md:py-1.5 rounded-md font-bold text-xs md:text-sm shadow-[2px_2px_0px_#2d2a26] active:translate-y-1 active:shadow-none transition-all flex items-center gap-1" title="回首頁/斷線">{!isMultiplayer ? '🏠' : '🔌'}<span className="hidden sm:inline ml-1">{!isMultiplayer ? '回首頁' : '退出'}</span></button>
                  </div>
               </div>
            </div>

            {isMultiplayer && (
              <div className="px-4 py-2 bg-[#fffdfa] border-b-4 border-slate-800 flex flex-wrap gap-2 items-center relative z-40 shadow-inner shrink-0">
                <span className="font-black text-slate-800 text-sm">👥 連線玩家：</span>
                {playersList.map((p, idx) => {
                  const isMe = p.id === myId;
                  const isRainbow = p.color === 'rainbow';
                  return (
                    <div key={idx} className="relative inline-flex">
                      <span 
                            onClick={() => setColorPickerTarget(prev => prev === p.id ? null : p.id)} 
                            title={isMe ? "點擊可切換你的代表色" : "點擊可為這位玩家更換顏色"} 
                            className={`px-2 py-0.5 rounded border-2 border-slate-800 text-xs font-bold bg-white text-slate-800 flex items-center shadow-[1px_1px_0px_rgba(30,41,59,1)] cursor-pointer hover:bg-slate-100 ${isRainbow ? 'rainbow-border-left' : 'transition-colors'}`} 
                            style={isRainbow ? undefined : { borderLeftColor: p.color, borderLeftWidth: '6px' }}>
                        {p.name} {p.isHost && '👑'} {isMe && '(你)'}
                      </span>
                      
                      {colorPickerTarget === p.id && (
                        <div className="absolute top-full mt-2 left-0 sm:left-0 bg-[#fffdfa] border-[3px] border-slate-800 rounded-xl p-3 shadow-[4px_4px_0px_rgba(30,41,59,1)] z-[100] w-[180px] animate-fadeIn">
                          <div className="flex justify-between items-center mb-2 border-b-2 border-slate-800 pb-1">
                            <h3 className="text-xs font-black text-slate-800">🎨 選色</h3>
                            <button onClick={(e) => { e.stopPropagation(); setColorPickerTarget(null); setColorSeq([]); }} className="text-slate-400 hover:text-slate-800 font-black leading-none">✕</button>
                          </div>
                          <div className="grid grid-cols-5 gap-1.5">
                            {COLORS.map(color => (
                              <button
                                key={color}
                                onClick={(e) => {
                                  e.stopPropagation();
                                  const colorIdx = COLORS.indexOf(color);
                                  let newSeq = [...colorSeq, colorIdx];
                                  // 彩虹解鎖密碼：左上(0), 右上(4), 左下(15), 右下(19)
                                  const targetSeq = [0, 4, 15, 19];
                                  
                                  let isValid = true;
                                  for (let i = 0; i < newSeq.length; i++) {
                                      if (newSeq[i] !== targetSeq[i]) { isValid = false; break; }
                                  }
                                  
                                  if (isValid) {
                                      setColorSeq(newSeq);
                                      if (newSeq.length === 4) {
                                          handlePlayerColorChange(p.id, 'rainbow');
                                          setColorPickerTarget(null);
                                          showToast("🌈 解鎖隱藏彩色漸變！");
                                          setColorSeq([]);
                                      } else {
                                          handlePlayerColorChange(p.id, color);
                                      }
                                  } else {
                                      setColorSeq([]);
                                      handlePlayerColorChange(p.id, color);
                                      setColorPickerTarget(null);
                                  }
                                }}
                                className="w-6 h-6 rounded-full border-[2px] border-slate-800 shadow-[1px_1px_0px_rgba(30,41,59,1)] hover:scale-110 hover:shadow-[2px_2px_0px_rgba(30,41,59,1)] transition-all active:scale-95 active:shadow-none"
                                style={{ backgroundColor: color }}
                                title={color}
                              />
                            ))}
                          </div>
                        </div>
                      )}
                    </div>
                  );
                })}
                {engineRef.current === 'peerjs' && (
                  <div className="ml-auto flex items-center">
                    <label className="flex items-center gap-1.5 cursor-pointer text-xs md:text-sm font-bold text-slate-700 hover:text-slate-900 bg-slate-100 px-2 py-1 rounded-md border-2 border-slate-300 shadow-[1px_1px_0px_rgba(30,41,59,1)] transition-colors hover:bg-slate-200">
                      <input 
                        type="checkbox" 
                        checked={showOtherCursors} 
                        onChange={(e) => setShowOtherCursors(e.target.checked)} 
                        className="w-3.5 h-3.5 md:w-4 md:h-4 accent-emerald-500" 
                      />
                      顯示游標
                    </label>
                  </div>
                )}
              </div>
            )}

            {!isHeaderCollapsed && (
              <div className="h-8 shrink-0 flex items-center justify-center bg-slate-800 text-white border-b-4 border-slate-800 relative z-30 font-bold tracking-wide">
                <span className="text-xs md:text-sm hidden md:inline">支援滑鼠拖曳、滾輪縮放；向下滑動畫布可自動收合選單。</span>
                <span className="text-xs md:text-sm md:hidden">點擊島嶼間空白處架橋。支援雙指縮放與平移。</span>
              </div>
            )}

            <div className="relative z-0 flex-1 flex flex-col min-h-0 bg-[#fffaf0]">
              
              {isGenerating && (
                <div className="absolute inset-0 z-[40] flex items-center justify-center pointer-events-none">
                  <div className="text-slate-800/30 font-black text-3xl md:text-5xl tracking-widest flex items-center select-none animate-pulse">
                    地圖產生中<span className="animate-loading-dots inline-block w-[1.5em] text-left"></span>
                  </div>
                </div>
              )}

              <div className="absolute bottom-4 right-4 md:bottom-6 md:right-6 flex flex-col gap-2 md:gap-3 z-[5] pointer-events-auto items-end">
                <div className="flex items-center">
                   {interactionMode === 2 && (
                       <div className="flex items-center gap-2 animate-fadeIn bg-white/80 p-1.5 rounded-full border-2 border-slate-300 backdrop-blur-sm mr-2 shadow-[2px_2px_0px_rgba(30,41,59,1)]">
                           <button 
                               onClick={() => setDrawSubMode('pen')} 
                               className={`w-9 h-9 md:w-10 md:h-10 border-2 border-slate-800 rounded-full font-black text-lg flex items-center justify-center shadow-sm transition-[transform,color] ${drawSubMode === 'pen' ? (myCurrentColor === 'rainbow' ? 'text-white scale-110 shadow-md rainbow-bg' : 'text-white scale-110 shadow-md') : 'bg-white text-slate-600 hover:bg-slate-100'}`}
                               style={drawSubMode === 'pen' && myCurrentColor !== 'rainbow' ? { backgroundColor: myCurrentColor } : {}}
                               title="畫筆 (可直接在畫布上任意做記號)"
                           >🖌️</button>
                           <button 
                               onClick={() => setDrawSubMode('eraser')} 
                               onDoubleClick={clearOwnStrokes} 
                               className={`w-9 h-9 md:w-10 md:h-10 border-2 border-slate-800 rounded-full font-black text-lg flex items-center justify-center shadow-sm transition-[transform,color] ${drawSubMode === 'eraser' ? (myCurrentColor === 'rainbow' ? 'text-white scale-110 shadow-md rainbow-bg' : 'text-white scale-110 shadow-md') : 'bg-white text-slate-600 hover:bg-slate-100'}`}
                               style={drawSubMode === 'eraser' && myCurrentColor !== 'rainbow' ? { backgroundColor: myCurrentColor } : {}}
                               title="橡皮擦 (連點兩下清空自己的所有塗鴉)"
                           >🧽</button>
                           {isHostRef.current && (
                               <button 
                                   onClick={clearAllStrokes} 
                                   className={`w-9 h-9 md:w-10 md:h-10 bg-red-500 hover:bg-red-600 text-white border-2 border-slate-800 rounded-full font-black text-lg transition-all flex items-center justify-center shadow-sm ml-1`}
                                   title="房主特權：一鍵清空所有人的塗鴉"
                               >🚨</button>
                           )}
                       </div>
                   )}
                   <button onClick={toggleInteractionMode} title={`切換模式 (目前: ${modeTitles[interactionMode]})`} className={`w-10 h-10 md:w-12 md:h-12 border-2 border-slate-800 rounded-full font-black text-xl md:text-2xl shadow-[3px_3px_0px_rgba(30,41,59,1)] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center ${interactionMode > 0 ? 'bg-[#ffcc00] text-slate-800' : 'bg-white text-slate-400 hover:text-slate-800 hover:bg-slate-100'}`}>
                     {modeIcons[interactionMode]}
                   </button>
                </div>
                <button onClick={handleZoomIn} title="放大" className="w-10 h-10 md:w-12 md:h-12 bg-white border-2 border-slate-800 rounded-full font-black text-xl md:text-2xl shadow-[3px_3px_0px_rgba(30,41,59,1)] hover:bg-slate-100 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center text-slate-800">＋</button>
                <button onClick={handleZoomOut} title="縮小" className="w-10 h-10 md:w-12 md:h-12 bg-white border-2 border-slate-800 rounded-full font-black text-2xl md:text-3xl shadow-[3px_3px_0px_rgba(30,41,59,1)] hover:bg-slate-100 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center text-slate-800">－</button>
                <button onClick={handleCycleZoom} title="循環切換縮放模式" className="w-10 h-10 md:w-12 md:h-12 bg-slate-800 border-2 border-slate-800 rounded-full font-black text-xs md:text-sm shadow-[3px_3px_0px_rgba(0,0,0,0.3)] hover:bg-slate-700 active:translate-y-1 active:shadow-none transition-all flex items-center justify-center text-white">
                  {zoomModeIdx === 0 ? '1x' : zoomModeIdx === 1 ? '↔️' : zoomModeIdx === 2 ? '↕️' : '🔲'}
                </button>
              </div>

              <div ref={zoomContainerRef} className="p-2 md:p-6 flex-1 overflow-auto custom-scrollbar relative z-0">
                <div className="flex justify-center items-center min-w-max min-h-max m-auto pb-24 pr-20">
                  <svg 
                    ref={svgRef}
                    onPointerMove={handlePointerMove}
                    onPointerDown={handlePointerDown}
                    onPointerUp={handlePointerUp}
                    onPointerLeave={(e) => { handlePointerUp(e); setEraserPos(null); }}
                    onPointerCancel={handlePointerUp}
                    viewBox={`0 0 ${svgW} ${svgH}`} 
                    className="bg-transparent transition-transform duration-100 ease-out origin-center select-none" 
                    style={{ 
                        width: `${svgW * zoomLevel}px`, 
                        height: `${svgH * zoomLevel}px`, 
                        touchAction: (interactionMode >= 2) ? 'none' : 'manipulation' 
                    }}>
                    <defs>
                      <pattern id="grid" width={SCALE} height={SCALE} patternUnits="userSpaceOnUse">
                        <path d={`M ${SCALE} 0 L 0 0 0 ${SCALE}`} fill="none" stroke="#e2e8f0" strokeWidth="1"/>
                      </pattern>
                    </defs>
                    <rect width="100%" height="100%" fill="url(#grid)" transform={`translate(${PADDING}, ${PADDING})`} className="opacity-50 pointer-events-none" />

                    {/* 解答線 */}
                    {showSolution && cLevel.solution && cLevel.solution.map((sol, idx) => {
                        const islandsMap = {}; islandsToRender.forEach(i => { islandsMap[i.id] = i; });
                        const f = islandsMap[sol.from], t = islandsMap[sol.to];
                        if (!f || !t) return null;
                        const x1 = f.x*SCALE+PADDING, y1 = f.y*SCALE+PADDING, x2 = t.x*SCALE+PADDING, y2 = t.y*SCALE+PADDING;

                        if (sol.count === 1) {
                            return <line key={`sol-${idx}`} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#ef4444" strokeWidth="6" strokeOpacity="0.4" strokeDasharray="8,6" className="solution-line pointer-events-none" />;
                        } else if (sol.count === 2) {
                            if (sol.type === 'h') {
                                return (
                                    <g key={`sol-${idx}`} className="pointer-events-none">
                                        <line x1={x1} y1={y1-5} x2={x2} y2={y2-5} stroke="#ef4444" strokeWidth="5" strokeOpacity="0.4" strokeDasharray="8,6" className="solution-line" />
                                        <line x1={x1} y1={y1+5} x2={x2} y2={y2+5} stroke="#ef4444" strokeWidth="5" strokeOpacity="0.4" strokeDasharray="8,6" className="solution-line" />
                                    </g>
                                );
                            } else {
                                return (
                                    <g key={`sol-${idx}`} className="pointer-events-none">
                                        <line x1={x1-5} y1={y1} x2={x2-5} y2={y2} stroke="#ef4444" strokeWidth="5" strokeOpacity="0.4" strokeDasharray="8,6" className="solution-line" />
                                        <line x1={x1+5} y1={y1} x2={x2+5} y2={y2} stroke="#ef4444" strokeWidth="5" strokeOpacity="0.4" strokeDasharray="8,6" className="solution-line" />
                                    </g>
                                );
                            }
                        }
                        return null;
                    })}

                    {/* 塗鴉筆跡 */}
                    {strokes.map(s => {
                        const strokeUid = s.uid || s.id.split('-')[1];
                        const isOwnStroke = strokeUid === myId;
                        
                        let strokeColor = s.color;
                        let strokeOpacity = 1;
                        let isRainbow = false;
                        
                        if (isMultiplayer && strokeUid) {
                            strokeColor = getPlayerColor(strokeUid);
                            if (strokeColor === 'rainbow') isRainbow = true;
                            strokeOpacity = isOwnStroke ? 1 : 0.5;
                        }

                        return (
                            <path
                                key={s.id}
                                d={s.path}
                                fill="none"
                                stroke={isRainbow ? undefined : strokeColor}
                                strokeOpacity={strokeOpacity}
                                strokeWidth="8"
                                strokeLinecap="round"
                                strokeLinejoin="round"
                                className={`doodle-stroke ${isRainbow ? 'rainbow-stroke' : ''}`}
                                data-stroke-id={s.id}
                                // 只有自己的筆跡在橡皮擦模式下才會有實體碰撞，其他人的筆跡直接物理穿透
                                style={{ pointerEvents: (interactionMode === 2 && drawSubMode === 'eraser' && isOwnStroke) ? 'stroke' : 'none' }}
                            />
                        );
                    })}
                    {currentPath && (
                        <path
                            d={currentPath.path}
                            fill="none"
                            stroke={myCurrentColor === 'rainbow' ? undefined : myCurrentColor}
                            strokeOpacity={1}
                            strokeWidth="8"
                            strokeLinecap="round"
                            strokeLinejoin="round"
                            className={`pointer-events-none ${myCurrentColor === 'rainbow' ? 'rainbow-stroke' : ''}`}
