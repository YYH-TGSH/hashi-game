<body>

  <!-- 雲端引擎初始化 -->
  <script type="module">

  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, collection, deleteDoc } = window.firebaseAPI;

    // === Firebase 配置 ===
    const providedConfig = {
      apiKey: "AIzaSyCbw8MNh616_OIBfoyh2gIhQQhsgsN8rAc",
      authDomain: "hashi-game-2c006.firebaseapp.com",
      databaseURL: "https://hashi-game-2c006-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "hashi-game-2c006",
      storageBucket: "hashi-game-2c006.firebasestorage.app",
      messagingSenderId: "732616383715",
      appId: "1:732616383715:web:f31a0f7f24a08f3b78b9d6"
    };

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : providedConfig;
    const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'hashi-hybrid-final';
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const COLORS = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4', '#f97316'];

    // === 關卡設定 ===
    const LEVELS = [
      { id: 1, name: "🎲 隨機 (5x5 幼幼班)", width: 5, height: 5, description: "最簡單的暖身關卡，試著連連看。" },
      { id: 2, name: "🎲 隨機 (10x10 標準)", width: 10, height: 10, description: "標準難度，注意所有島嶼都要連通喔！" },
      { id: 3, name: "🎲 隨機 (10x20 手機直式)", width: 10, height: 20, description: "適合手機滑動的長條形地圖。" },
      { id: 4, name: "🎲 隨機 (15x15 魔王)", width: 15, height: 15, description: "極具挑戰性！找尋角落的大數字作為突破口。" },
      { id: 5, name: "🎲 隨機 (20x20 史詩)", width: 20, height: 20, description: "超大地圖，請善用右下角的畫面縮放功能。" }
    ];

    // ==========================================
    // 智慧逆向生成演算法 (高密度版)
    // ==========================================
    function generateRandomHashi(levelDef) {
      const width = levelDef.width, height = levelDef.height;
      let islands = [], topologyBridges = [];
      let grid = Array(height).fill(null).map(function() { return Array(width).fill(null); });
      let islandId = 1;
      
      let startX = Math.floor(width / 2), startY = Math.floor(height / 2);
      let firstIsland = { id: islandId++, x: startX, y: startY, req: 0 };
      islands.push(firstIsland);
      grid[startY][startX] = { type: 'island', island: firstIsland };
      
      const dirs = [[0, -1], [0, 1], [-1, 0], [1, 0]]; 
      const area = width * height;
      let targetIslandCount = Math.floor(area * 0.22);
      let maxAttempts = area * 20;
      let attempts = 0;
      
      while (islands.length < targetIslandCount && attempts < maxAttempts) {
        attempts++;
        let source = islands[Math.floor(Math.random() * islands.length)];
        let dir = dirs[Math.floor(Math.random() * dirs.length)];
        let dist = 1;
        let hitType = null, hitObj = null;

        while (true) {
            let nx = source.x + dir[0] * dist;
            let ny = source.y + dir[1] * dist;
            if (nx < 0 || nx >= width || ny < 0 || ny >= height) { hitType = 'wall'; break; }
            if (grid[ny][nx]) {
                hitType = grid[ny][nx].type;
                if (hitType === 'island') hitObj = grid[ny][nx].island;
                break;
            }
            dist++;
        }

        if (hitType === 'bridge') continue;

        let target_d = 0;
        let targetIslandObj = null;

        if (hitType === 'island') {
            if (dist < 2) continue; 
            if (Math.random() < 0.6) { target_d = dist; targetIslandObj = hitObj; } 
            else continue;
        } else if (hitType === 'wall') {
            if (dist < 3) continue; 
            let max_possible = dist - 1;
            let pool = [];
            for (let i = 2; i <= max_possible; i++) { pool.push(i); if (i <= 3) pool.push(i); }
            target_d = pool[Math.floor(Math.random() * pool.length)];
        }

        if (!target_d) continue;

        let newX = source.x + dir[0] * target_d;
        let newY = source.y + dir[1] * target_d;

        if (!targetIslandObj) {
            let tooClose = false;
            for (let dy = -1; dy <= 1; dy++) {
                for (let dx = -1; dx <= 1; dx++) {
                    if (dx === 0 && dy === 0) continue;
                    let checkX = newX + dx, checkY = newY + dy;
                    if (checkX >= 0 && checkX < width && checkY >= 0 && checkY < height) {
                        if (grid[checkY][checkX] && grid[checkY][checkX].type === 'island') tooClose = true;
                    }
                }
            }
            if (tooClose) continue;

            targetIslandObj = { id: islandId++, x: newX, y: newY, req: 0 };
            islands.push(targetIslandObj);
            grid[newY][newX] = { type: 'island', island: targetIslandObj };
        }

        let existingBridge = topologyBridges.find(function(b) {
          return (b.from === source.id && b.to === targetIslandObj.id) || (b.to === source.id && b.from === targetIslandObj.id);
        });

        if (!existingBridge) {
            let newBridge = { from: source.id, to: targetIslandObj.id, type: dir[0] !== 0 ? 'h' : 'v', count: 0 };
            topologyBridges.push(newBridge);
            for (let j = 1; j < target_d; j++) grid[source.y + dir[1] * j][source.x + dir[0] * j] = { type: 'bridge' };
        }
      }

      for (let i = 0; i < islands.length; i++) {
          let source = islands[i];
          for (let d = 0; d < dirs.length; d++) {
              let dir = dirs[d];
              let dist = 1;
              let hitObj = null;
              while (true) {
                  let nx = source.x + dir[0] * dist;
                  let ny = source.y + dir[1] * dist;
                  if (nx < 0 || nx >= width || ny < 0 || ny >= height) break;
                  if (grid[ny][nx]) {
                      if (grid[ny][nx].type === 'island') hitObj = grid[ny][nx].island;
                      break; 
                  }
                  dist++;
              }
              if (hitObj && dist >= 2) {
                  let existingBridge = topologyBridges.find(function(b) {
                      return (b.from === source.id && b.to === hitObj.id) || (b.to === source.id && b.from === hitObj.id);
                  });
                  if (!existingBridge && Math.random() < 0.6) {
                      topologyBridges.push({ from: source.id, to: hitObj.id, type: dir[0] !== 0 ? 'h' : 'v', count: 0 });
                      for (let j = 1; j < dist; j++) grid[source.y + dir[1] * j][source.x + dir[0] * j] = { type: 'bridge' };
                  }
              }
          }
      }

      let solutionBridges = [];
      topologyBridges.forEach(function(b) {
          b.count = Math.random() < 0.5 ? 1 : 2; 
          solutionBridges.push(b);
      });

      solutionBridges.forEach(function(b) {
        let fromNode = islands.find(function(i) { return i.id === b.from; });
        let toNode = islands.find(function(i) { return i.id === b.to; });
        if (fromNode) fromNode.req += b.count;
        if (toNode) toNode.req += b.count;
      });

      islands = islands.filter(function(i) { return i.req > 0; });

      return { 
        id: levelDef.id, name: levelDef.name, width: width, height: height, 
        description: levelDef.description, isRandom: true, islands: islands, solution: solutionBridges 
      };
    }

    function generateEmptyBridges(level) {
      let pb = []; let bridgeId = 1;
      const isl = (level && level.islands) ? level.islands : [];
      for (let i = 0; i < isl.length; i++) {
        let a = isl[i]; let rN = null, bN = null;
        for (let j = 0; j < isl.length; j++) {
          let b = isl[j];
          if (b.y === a.y && b.x > a.x) if (!rN || b.x < rN.x) rN = b;
          if (b.x === a.x && b.y > a.y) if (!bN || b.y < bN.y) bN = b;
        }
        if (rN) pb.push({ id: bridgeId++, from: a.id, to: rN.id, type: 'h', count: 0 });
        if (bN) pb.push({ id: bridgeId++, from: a.id, to: bN.id, type: 'v', count: 0 });
      }
      return pb;
    }

    function formatTime(secs) {
      const m = String(Math.floor(secs / 60)).padStart(2, '0');
      const s = String(secs % 60).padStart(2, '0');
      return m + ":" + s;
    }

    // ==========================================
    // React 主程式
    // ==========================================

    function HashiGame() {
      // === 唯一身分識別 ===
      const playerIdRef = useRef(Math.random().toString(36).substring(2, 12));
      const myId = playerIdRef.current;

      // === 基本狀態 ===
      const [user, setUser] = useState(null);
      const [screen, setScreen] = useState('home');
      const [engine, setEngine] = useState('none');
      const [currentLevelId, setCurrentLevelId] = useState(2); 
      const [randomLevelData, setRandomLevelData] = useState(() => generateRandomHashi(LEVELS[1]));
      const [bridges, setBridges] = useState(() => generateEmptyBridges(generateRandomHashi(LEVELS[1])));
      const [history, setHistory] = useState([]);
      const [isWon, setIsWon] = useState(false);
      const [hideVictoryModal, setHideVictoryModal] = useState(false);
      const [toastMsg, setToastMsg] = useState("");
      
      const [startTime, setStartTime] = useState(Date.now());
      const [elapsedTime, setElapsedTime] = useState(0);
      const [zoomLevel, setZoomLevel] = useState(1);
      const [showSolution, setShowSolution] = useState(false);
      const [isHeaderCollapsed, setIsHeaderCollapsed] = useState(false);
      const [showSaveModal, setShowSaveModal] = useState(false);
      const [saveCode, setSaveCode] = useState("");

      // === 多人連線狀態 ===
      const [roomId, setRoomId] = useState("");
      const [isHost, setIsHost] = useState(false);
      const [tempRoomId, setTempRoomId] = useState("");
      const [tempPlayerName, setTempPlayerName] = useState("");
      const [stableMode, setStableMode] = useState(false); 
      const [titleClicks, setTitleClicks] = useState(0);
      const [playersList, setPlayersList] = useState([]);
      const [isConnecting, setIsConnecting] = useState(false);

      // === Refs 突破閉包 ===
      const engineRef = useRef('none');
      const isHostRef = useRef(false);
      const peerRef = useRef(null);
      const connRef = useRef(null); 
      const connsRef = useRef([]); 
      const roomRef = useRef(null);
      const unsubRef = useRef(null);
      const zoomContainerRef = useRef(null);
      const lastPinchDist = useRef(null);
      const stateRef = useRef({ bridges: [], levelId: 2, randomLevelData: null, showSolution: false, startTime: Date.now() });

      // === 初始化 Firebase Auth ===
      useEffect(function() {
        const initAuth = async function() {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch(err) { console.error("Firebase 登入失敗", err); }
        };
        initAuth();
        onAuthStateChanged(auth, function(u) { if(u) setUser(u); });
      }, []);

      useEffect(function() {
        stateRef.current = { bridges: bridges, randomLevelData: randomLevelData, showSolution: showSolution, startTime: startTime, levelId: currentLevelId };
      }, [bridges, randomLevelData, showSolution, startTime, currentLevelId]);

      useEffect(function() {
        if (isWon || screen !== 'game') return;
        const t = setInterval(function() { setElapsedTime(Math.floor((Date.now() - startTime) / 1000)); }, 1000);
        return function() { clearInterval(t); };
      }, [startTime, isWon, screen]);

      // 畫布縮放與面板自動收合
      useEffect(function() {
        if (screen !== 'game') return;
        const el = zoomContainerRef.current;
        if (!el) return;
        let touchStartY = null;

        const handleTouchStart = function(e) { if (e.touches.length === 1) { touchStartY = e.touches[0].clientY; } };
        const handleTouchMove = function(e) {
          if (e.touches.length === 2) {
            e.preventDefault(); 
            const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            if (lastPinchDist.current) {
              const delta = dist - lastPinchDist.current;
              setZoomLevel(function(prev) { return Math.min(Math.max(prev + delta * 0.005, 0.4), 3.5); });
            }
            lastPinchDist.current = dist;
          } else if (e.touches.length === 1 && touchStartY !== null) {
            const dy = e.touches[0].clientY - touchStartY;
            if (Math.abs(dy) > 30 && !isHeaderCollapsed) { setIsHeaderCollapsed(true); }
          }
        };
        const handleTouchEnd = function() { lastPinchDist.current = null; touchStartY = null; };
        const handleWheel = function(e) { if (Math.abs(e.deltaY) > 10 && !isHeaderCollapsed) { setIsHeaderCollapsed(true); } };
        
        el.addEventListener('touchstart', handleTouchStart, { passive: true });
        el.addEventListener('touchmove', handleTouchMove, { passive: false });
        el.addEventListener('touchend', handleTouchEnd);
        el.addEventListener('touchcancel', handleTouchEnd);
        el.addEventListener('wheel', handleWheel, { passive: true });

        return function() {
          el.removeEventListener('touchstart', handleTouchStart);
          el.removeEventListener('touchmove', handleTouchMove);
          el.removeEventListener('touchend', handleTouchEnd);
          el.removeEventListener('touchcancel', handleTouchEnd);
          el.removeEventListener('wheel', handleWheel);
        };
      }, [screen, isHeaderCollapsed]);

      const showToast = (m) => { setToastMsg(m); setTimeout(function() { setToastMsg(""); }, 4000); };

      // === 遊戲狀態同步 ===
      const syncState = (partial, shouldBroadcast = true) => {
        if (partial.bridges !== undefined) setBridges(partial.bridges);
        if (partial.showSolution !== undefined) setShowSolution(partial.showSolution);
        if (partial.randomLevelData !== undefined) setRandomLevelData(partial.randomLevelData);
        if (partial.startTime !== undefined) setStartTime(partial.startTime);
        if (partial.levelId !== undefined) setCurrentLevelId(partial.levelId);
        
        const updatedState = { ...stateRef.current, ...partial };
        stateRef.current = updatedState;

        if (shouldBroadcast) {
            if (engineRef.current === 'firebase' && roomRef.current) {
              const safeState = JSON.parse(JSON.stringify(updatedState));
              updateDoc(roomRef.current, { "gameState": safeState, updatedAt: Date.now() }).catch(function(e){});
            } else if (engineRef.current === 'peerjs') {
              if (isHostRef.current) {
                 connsRef.current.forEach(function(c) { c.send({ type: 'SYNC', data: updatedState }); });
              } else if (connRef.current) {
                 connRef.current.send({ type: 'SYNC', data: updatedState });
              }
            }
        }
      };

      // 橋樑點擊與防呆
      const handleBridgeClick = (bId) => {
        if (isWon) return;
        const cur = bridges || [];
        const target = cur.find(function(b) { return b.id === bId; });
        if (!target) return;
        
        if (target.count === 0) {
          const islandsMap = {};
          const cLevel = randomLevelData || { islands: [] };
          (cLevel.islands || []).forEach(function(i){ islandsMap[i.id] = i; });
          const tFrom = islandsMap[target.from], tTo = islandsMap[target.to];
          let isCross = false;
          if (tFrom && tTo) {
            if (target.type === 'h') {
              const y = tFrom.y, minX = Math.min(tFrom.x, tTo.x), maxX = Math.max(tFrom.x, tTo.x);
              for (let i=0; i<cur.length; i++) {
                let b = cur[i];
                if (b.count > 0 && b.type === 'v') {
                  const bFrom = islandsMap[b.from], bTo = islandsMap[b.to];
                  if (bFrom && bTo && bFrom.x > minX && bFrom.x < maxX && y > Math.min(bFrom.y, bTo.y) && y < Math.max(bFrom.y, bTo.y)) isCross = true;
                }
              }
            } else {
              const x = tFrom.x, minY = Math.min(tFrom.y, tTo.y), maxY = Math.max(tFrom.y, tTo.y);
              for (let i=0; i<cur.length; i++) {
                let b = cur[i];
                if (b.count > 0 && b.type === 'h') {
                  const bFrom = islandsMap[b.from], bTo = islandsMap[b.to];
                  if (bFrom && bTo && bFrom.y > minY && bFrom.y < maxY && x > Math.min(bFrom.x, bTo.x) && x < Math.max(bFrom.x, bTo.x)) isCross = true;
                }
              }
            }
          }
          if (isCross) return showToast("🚫 橋樑不能交叉喔！請先移除阻擋的橋。");
        }

        if (engineRef.current === 'none') setHistory(function(past) { return [...past, cur]; });
        const nextCount = (target.count + 1) % 3;
        const newOwner = nextCount > 0 ? myId : null;
        const nextBridges = cur.map(function(b) { 
            return b.id === bId ? { ...b, count: nextCount, owner: newOwner } : b; 
        });
        syncState({ bridges: nextBridges });
      };

      // === 工具按鈕動作 (所有人皆可操作) ===
      const handleUndo = () => {
        if (history.length === 0 || isWon || engineRef.current !== 'none') return;
        const previousState = history[history.length - 1];
        syncState({ bridges: previousState });
        setHistory(function(past) { return past.slice(0, -1); });
      };

      const handleReset = () => {
        const empty = generateEmptyBridges(randomLevelData);
        syncState({ bridges: empty, showSolution: false, startTime: Date.now() });
        if (engineRef.current === 'none') setHistory([]);
        setIsWon(false); setElapsedTime(0);
      };

      const handleRegenerateRandom = () => {
        const targetLevelDef = LEVELS.find(function(l) { return l.id === currentLevelId; }) || LEVELS[1];
        const newRandomData = generateRandomHashi(targetLevelDef);
        const empty = generateEmptyBridges(newRandomData);
        syncState({ levelId: currentLevelId, randomLevelData: newRandomData, bridges: empty, showSolution: false, startTime: Date.now() });
        setIsWon(false); setHistory([]); setElapsedTime(0); setHideVictoryModal(false);
      };

      const handleLevelChange = (newLevelId) => {
        const targetLevelDef = LEVELS.find(function(l) { return l.id === newLevelId; });
        if(!targetLevelDef) return;
        const newRandomData = generateRandomHashi(targetLevelDef);
        const empty = generateEmptyBridges(newRandomData);
        syncState({ levelId: newLevelId, randomLevelData: newRandomData, bridges: empty, showSolution: false, startTime: Date.now() });
        setIsWon(false); setHistory([]); setZoomLevel(1); setElapsedTime(0);
      };

      const handleShowSolution = () => { syncState({ showSolution: true }); };

      // === 切換單機模式 ===
      const switchToOffline = () => {
        if (unsubRef.current) { unsubRef.current(); unsubRef.current = null; }
        if (peerRef.current) { peerRef.current.destroy(); peerRef.current = null; }
        setEngine('none'); engineRef.current = 'none';
        setIsHost(false); isHostRef.current = false;
        setRoomId(""); setPlayersList([]);
        roomRef.current = null; connsRef.current = []; connRef.current = null;
      };

      // === 多人連線雙引擎核心 ===
      const startSinglePlayer = () => {
        switchToOffline(); setScreen('game'); handleReset();
      };

      const initiateHostGame = () => {
        const pName = tempPlayerName.trim();
        if (!pName) return showToast("⚠️ 請先設定顯示暱稱");
        
        setIsConnecting(true); 
        const rId = Math.floor(1000 + Math.random() * 9000).toString();
        const finalId = stableMode ? "S" + rId : rId;
        
        if (stableMode) { 
           setEngine('firebase'); engineRef.current = 'firebase'; 
           setupFirebase(finalId, pName, true); 
        } else { 
           setEngine('peerjs'); engineRef.current = 'peerjs'; 
           setupPeerJS(finalId, pName, true); 
        }
      };

      const joinExistingGame = () => {
        const pName = tempPlayerName.trim();
        const rId = tempRoomId.trim().toUpperCase();
        if (!pName || !rId) return showToast("⚠️ 請完整輸入暱稱與代碼");
        
        setIsConnecting(true); 
        if (/^[a-zA-Z]/.test(rId)) { 
           setEngine('firebase'); engineRef.current = 'firebase'; 
           setupFirebase(rId, pName, false); 
        } else { 
           setEngine('peerjs'); engineRef.current = 'peerjs'; 
           setupPeerJS(rId, pName, false); 
        }
      };

      const setupFirebase = async (rId, pName, isCreating) => {
        if (!user) { setIsConnecting(false); return showToast("⚠️ 伺服器連線中，請稍後"); }
        const safeAppId = typeof __app_id !== 'undefined' && __app_id ? __app_id : 'default-app-id';
        const rDoc = doc(db, 'artifacts', safeAppId, 'public', 'data', 'rooms', rId);
        roomRef.current = rDoc;

        try {
          if (isCreating) {
            setIsHost(true); isHostRef.current = true;
            const safeState = JSON.parse(JSON.stringify(stateRef.current));
            await setDoc(rDoc, { hostId: myId, players: [{id: myId, name: pName, isHost: true, color: COLORS[0]}], gameState: safeState, updatedAt: Date.now() });
          } else {
            const snap = await getDoc(rDoc);
            if (!snap.exists()) { setIsConnecting(false); return showToast("⚠️ 找不到該對局大廳，請確認代碼"); }
            setIsHost(false); isHostRef.current = false;
            let pList = snap.data().players || [];
            if (!pList.find(function(p){return p.id === myId;})) {
              pList.push({ id: myId, name: pName, isHost: false, color: COLORS[pList.length % COLORS.length] });
              await updateDoc(rDoc, { players: pList, updatedAt: Date.now() });
            }
          }
          setRoomId(rId); setScreen('game'); setIsHeaderCollapsed(false); setIsConnecting(false);

          unsubRef.current = onSnapshot(rDoc, function(docSnap) {
            if (!docSnap.exists()) { 
               if(engineRef.current !== 'none') { showToast("⚠️ 房主已斷線，切換為單機模式"); switchToOffline(); }
               return; 
            }
            const data = docSnap.data();
            setPlayersList(data.players || []);
            if (data.gameState) {
              const gs = data.gameState;
              if (gs.bridges) setBridges(gs.bridges);
              if (gs.randomLevelData) setRandomLevelData(gs.randomLevelData);
              if (gs.levelId !== undefined) setCurrentLevelId(gs.levelId);
              if (gs.showSolution !== undefined) setShowSolution(gs.showSolution);
              if (gs.startTime) setStartTime(gs.startTime);
              stateRef.current = gs;
            }
          }, function(err) { showToast("⚠️ 網路波動，同步中..."); });
        } catch(e) { setIsConnecting(false); showToast("⚠️ 雲端連線失敗，請檢查網路"); }
      };

      const setupPeerJS = (rId, pName, isCreating) => {
        if (isCreating) {
            const p = new Peer(rId + '-host');
            peerRef.current = p;
            p.on('open', function() {
              setIsHost(true); isHostRef.current = true;
              setRoomId(rId); setScreen('game'); setIsHeaderCollapsed(false); setIsConnecting(false);
              setPlayersList([{ id: myId, name: pName, isHost: true, color: COLORS[0] }]);
              
              p.on('connection', function(c) {
                connsRef.current.push(c);
                c.on('data', function(m) {
                  if (m.type === 'JOIN') {
                      setPlayersList(function(prev){
                          if(prev.find(function(pl){return pl.id===m.uid;})) return prev;
                          const nList = [...prev, { id: m.uid, name: m.pName, isHost: false, color: COLORS[prev.length % COLORS.length] }];
                          connsRef.current.forEach(function(conn) { conn.send({ type: 'INIT', data: stateRef.current, players: nList }); });
                          return nList;
                      });
                  } else if (m.type === 'SYNC') {
                      syncState(m.data, false);
                      connsRef.current.forEach(function(conn) { if(conn.peer !== c.peer) conn.send({ type: 'SYNC', data: m.data }); });
                  } else if (m.type === 'REQ_COLOR_CHANGE') {
                      setPlayersList(function(prev){
                          const nList = prev.map(function(pl){
                              if (pl.id === m.targetId) return { ...pl, color: COLORS[(COLORS.indexOf(pl.color) + 1) % COLORS.length] };
                              return pl;
                          });
                          connsRef.current.forEach(function(conn) { conn.send({ type: 'PLAYERS_UPDATE', players: nList }); });
                          return nList;
                      });
                  }
                });
                c.on('close', function() {
                    connsRef.current = connsRef.current.filter(function(conn){return conn.peer !== c.peer;});
                });
              });
            });
            p.on('error', function(err) { setIsConnecting(false); showToast("⚠️ 無法建立對局大廳，請重試"); });
        } else {
            const guestP = new Peer();
            peerRef.current = guestP;
            guestP.on('open', function() {
                const c = guestP.connect(rId + '-host');
                connRef.current = c;
                c.on('open', function() { 
                  setIsHost(false); isHostRef.current = false;
                  setRoomId(rId); setScreen('game'); setIsHeaderCollapsed(false); setIsConnecting(false);
                  c.send({ type: 'JOIN', pName: pName, uid: myId });
                });
                c.on('data', function(m) {
                  if (m.type === 'INIT') {
                      if (m.players) setPlayersList(m.players);
                      if (m.data) syncState(m.data, false);
                  } else if (m.type === 'SYNC') {
                      syncState(m.data, false);
                  } else if (m.type === 'PLAYERS_UPDATE') {
                      if (m.players) setPlayersList(m.players);
                  }
                });
                c.on('close', function() { 
                    if(engineRef.current !== 'none') { showToast("⚠️ 房主已斷線，切換為單機模式"); switchToOffline(); }
                });
            });
            guestP.on('error', function(err) { setIsConnecting(false); showToast("⚠️ 無法連線，請確認代碼是否正確"); });
        }
      };

      const handleGoHome = () => {
        if (engineRef.current !== 'none') {
            if (unsubRef.current) unsubRef.current();
            if (isHostRef.current && engineRef.current === 'firebase' && roomRef.current) {
               deleteDoc(roomRef.current).catch(function(e){});
            } else if (!isHostRef.current && engineRef.current === 'firebase' && roomRef.current) {
               const updatedPlayers = playersList.filter(function(p){ return p.id !== myId; });
               updateDoc(roomRef.current, { players: updatedPlayers }).catch(function(e){});
            }
            if (peerRef.current) peerRef.current.destroy();
        }
        switchToOffline(); setScreen('home'); setIsWon(false); setElapsedTime(0); setHistory([]);
      };

      // === 點擊玩家換色邏輯 ===
      const handlePlayerColorChange = (playerId) => {
        if (engineRef.current === 'none') return;
        if (playerId === myId) return; // 自己不能換自己的顏色

        if (engineRef.current === 'firebase' && roomRef.current) {
            const updatedPlayers = playersList.map(function(p) { 
                if (p.id === playerId) return { ...p, color: COLORS[(COLORS.indexOf(p.color) + 1) % COLORS.length] }; 
                return p; 
            });
            setPlayersList(updatedPlayers);
            updateDoc(roomRef.current, { players: updatedPlayers }).catch(function(e){});
        } else if (engineRef.current === 'peerjs') {
            if (isHostRef.current) {
                setPlayersList(function(prev){
                    const nList = prev.map(function(p){
                        if (p.id === playerId) return { ...p, color: COLORS[(COLORS.indexOf(p.color) + 1) % COLORS.length] };
                        return p;
                    });
                    connsRef.current.forEach(function(c) { c.send({ type: 'PLAYERS_UPDATE', players: nList }); });
                    return nList;
                });
            } else if (connRef.current) {
                connRef.current.send({ type: 'REQ_COLOR_CHANGE', targetId: playerId });
            }
        }
      };

      // === 過關判定 ===
      const islandCurrentCounts = useMemo(function() {
        const counts = {};
        const islands = (randomLevelData && randomLevelData.islands) ? randomLevelData.islands : [];
        islands.forEach(function(i) { counts[i.id] = 0; });
        (bridges || []).forEach(function(b) {
          if (counts[b.from] !== undefined) counts[b.from] += b.count;
          if (counts[b.to] !== undefined) counts[b.to] += b.count;
        });
        return counts;
      }, [bridges, randomLevelData]);

      useEffect(function() {
        const islands = (randomLevelData && randomLevelData.islands) ? randomLevelData.islands : [];
        if (islands.length === 0) { if (isWon) setIsWon(false); return; }
        let allCountsMatch = true;
        for (let i=0; i<islands.length; i++) { if (islandCurrentCounts[islands[i].id] !== islands[i].req) { allCountsMatch = false; break; } }
        if (!allCountsMatch) { if (isWon) setIsWon(false); return; }
        
        const adjList = {}; islands.forEach(function(i) { adjList[i.id] = []; });
        (bridges || []).forEach(function(b) { if (b.count > 0 && adjList[b.from] && adjList[b.to]) { adjList[b.from].push(b.to); adjList[b.to].push(b.from); } });
        const visited = new Set(); const queue = [islands[0].id];
        if (queue.length > 0) visited.add(queue[0]);
        while (queue.length > 0) {
          const curr = queue.shift();
          if (adjList[curr]) {
            adjList[curr].forEach(function(neighbor) { if (!visited.has(neighbor)) { visited.add(neighbor); queue.push(neighbor); } });
          }
        }
        if (visited.size === islands.length && islands.length > 0) { if (!isWon) { setIsWon(true); setHideVictoryModal(false); } } 
        else { setIsWon(false); }
      }, [bridges, randomLevelData, islandCurrentCounts, isWon]);

      // 存讀檔
      const handleSaveCode = () => {
        const saveData = { lid: currentLevelId, r: randomLevelData, b: (bridges || []).filter(function(br){return br.count > 0;}).map(function(br){return { i: br.id, c: br.count, o: br.owner };}) };
        const code = btoa(encodeURIComponent(JSON.stringify(saveData)));
        setSaveCode(code);
        const textArea = document.createElement("textarea"); textArea.value = code; document.body.appendChild(textArea); textArea.select();
        try { document.execCommand('copy'); showToast("✅ 已產生並複製代碼！"); } catch (err) {}
        document.body.removeChild(textArea);
      };
      const handleQuickPaste = async () => {
        try { if (navigator.clipboard && navigator.clipboard.readText) { const text = await navigator.clipboard.readText(); if(text) { setSaveCode(text); showToast("✅ 貼上成功！"); } } else { throw new Error(); } } 
        catch (err) { const ta = document.getElementById("saveCodeTextarea"); if (ta) ta.focus(); showToast("⚠️ 瀏覽器阻擋自動貼上，請手動貼上"); }
      };
      const handleLoadCode = () => {
        try {
          if (!saveCode.trim()) return showToast("⚠️ 請貼上代碼");
          const data = JSON.parse(decodeURIComponent(atob(saveCode.trim())));
          const baseLevel = LEVELS.find(function(l){return l.id === data.lid;});
          if (!baseLevel) return showToast("⚠️ 無效的代碼");
          const newRandom = data.r;
          const emptyBridges = generateEmptyBridges(newRandom || baseLevel);
          data.b.forEach(function(savedBr){ let tb = emptyBridges.find(function(eb){return eb.id === savedBr.i;}); if (tb) { tb.count = savedBr.c; tb.owner = savedBr.o; } });
          setCurrentLevelId(data.lid);
          syncState({ randomLevelData: newRandom, bridges: emptyBridges, showSolution: false });
          setIsWon(false); setShowSaveModal(false); showToast("✅ 讀取成功！");
        } catch(e) { showToast("⚠️ 讀檔失敗！"); }
      };

      const handleZoomIn = () => setZoomLevel(function(prev){return Math.min(prev + 0.3, 3.5);});
      const handleZoomOut = () => setZoomLevel(function(prev){return Math.max(prev - 0.3, 0.4);});
      const handleZoomReset = () => setZoomLevel(1);

      // === UI 渲染 ===
      if (screen === 'home') {
        return (
          <div className="h-screen w-screen flex flex-col items-center justify-center p-4 relative overflow-hidden animate-fadeIn">
            <div className="bg-[#fffdfa] border-[4px] border-[#2d2a26] p-10 rounded-2xl shadow-[8px_8px_0px_#2d2a26] text-center transform -rotate-1 w-full max-w-md z-10">
              <h1 className="text-6xl font-black mb-6 flex justify-center gap-3">
                <span className="bg-[#ffcc00] px-4 py-2 border-[4px] border-[#2d2a26] rounded-xl transform rotate-3 shadow-[4px_4px_0px_#2d2a26]">數</span>
                <span className="bg-[#ffcc00] px-4 py-2 border-[4px] border-[#2d2a26] rounded-xl transform -rotate-2 shadow-[4px_4px_0px_#2d2a26]">橋</span>
              </h1>
              <div className="inline-block border-[3px] border-dashed border-[#2d2a26] rounded-xl px-6 py-2 mb-8 bg-white transform rotate-2">
                <p className="text-[#2d2a26] font-black text-xl tracking-widest uppercase italic">Hashi Puzzle</p>
              </div>
              <div className="flex flex-col gap-4">
                <button onClick={startSinglePlayer} className="w-full py-4 bg-white border-[4px] border-[#2d2a26] rounded-xl font-black text-xl shadow-[4px_4px_0px_#2d2a26] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_#2d2a26] transition-all transform rotate-1">👤 單機挑戰</button>
                <button onClick={function(){ setScreen('join'); }} className="w-full py-4 bg-emerald-400 border-[4px] border-[#2d2a26] rounded-xl font-black text-xl shadow-[4px_4px_0px_#2d2a26] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_#2d2a26] transition-all transform -rotate-1">🌐 多人對戰</button>
              </div>
            </div>
            <div className="mt-8 font-black opacity-30 text-sm z-10">葉大帥@2026</div>
          </div>
        );
      }

      if (screen === 'join') {
        return (
          <div className="h-screen w-screen flex flex-col items-center justify-center p-4 animate-fadeIn">
            <div className="bg-white border-[4px] border-[#2d2a26] p-8 rounded-2xl shadow-[10px_10px_0px_#2d2a26] max-w-2xl w-full z-10">
              <h2 onClick={function(){
                const c = titleClicks + 1; setTitleClicks(c);
                if (c >= 3 && !stableMode) { setStableMode(true); showToast("🛡️ 隱藏彩蛋：穩定雲端模式已開啟！(產生的代碼將有S)"); }
              }} className="text-2xl font-black mb-6 border-b-4 border-[#ffcc00] inline-block cursor-pointer select-none">🌐 多人連線選單</h2>
              
              <div className="mb-6">
                <label className="block text-[#2d2a26] font-bold text-sm mb-1 italic">第一步：設定顯示暱稱</label>
                <input type="text" placeholder="輸入同學認得的名字" value={tempPlayerName} onChange={function(e){setTempPlayerName(e.target.value);}} disabled={isConnecting} className="w-full border-[3px] border-[#2d2a26] rounded-lg p-3 font-bold bg-yellow-50 outline-none focus:ring-2 ring-[#ffcc00] disabled:opacity-50" />
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div className="border-t-4 md:border-t-0 md:border-r-4 border-dashed border-slate-200 pt-4 md:pt-0 md:pr-6 flex flex-col h-full">
                   <h3 className="font-black text-lg mb-2 flex items-center gap-2 text-[#2d2a26]">👑 建立對局大廳</h3>
                   <p className="text-xs text-slate-500 mb-4 font-bold leading-relaxed">擔任對局主機，系統會自動分派一組邀請碼供同學加入。</p>
                   <div className="mt-auto">
                     {stableMode && <div className="text-xs font-bold text-emerald-600 mb-2 animate-pulse">✓ 雲端模式準備就緒</div>}
                     <button onClick={initiateHostGame} disabled={isConnecting} className="w-full py-3 bg-blue-500 text-white border-[3px] border-[#2d2a26] rounded-xl font-black shadow-[4px_4px_0px_#2d2a26] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_#2d2a26] transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                       {isConnecting ? "大廳建立中..." : "發起多人對局"}
                     </button>
                   </div>
                </div>

                <div className="pt-4 md:pt-0 flex flex-col h-full">
                   <h3 className="font-black text-lg mb-2 flex items-center gap-2 text-[#2d2a26]">👤 參與現有對局</h3>
                   <p className="text-xs text-slate-500 mb-2 font-bold leading-relaxed">請輸入主機分派的 4 碼 (或 S 開頭) 邀請碼：</p>
                   <input type="text" maxLength="5" placeholder="輸入邀請碼" value={tempRoomId} onChange={function(e){setTempRoomId(e.target.value.toUpperCase());}} disabled={isConnecting} className="w-full border-[3px] border-[#2d2a26] rounded-lg p-3 font-black text-center text-2xl mb-4 tracking-widest outline-none bg-emerald-50 uppercase shadow-[3px_3px_0px_#2d2a26] disabled:opacity-50" />
                   <button onClick={joinExistingGame} disabled={isConnecting} className="w-full py-3 bg-emerald-400 text-[#2d2a26] border-[3px] border-[#2d2a26] rounded-xl font-black shadow-[4px_4px_0px_#2d2a26] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_#2d2a26] transition-all mt-auto disabled:opacity-50 disabled:cursor-not-allowed">
                     {isConnecting ? "連線加入中..." : "參與對局連線"}
                   </button>
                </div>
              </div>

              <button onClick={function(){setScreen('home');}} disabled={isConnecting} className="mt-8 w-full text-slate-400 font-bold hover:text-[#2d2a26] hover:underline text-center transition-colors disabled:opacity-50">取消返回主選單</button>
            </div>
            {toastMsg && <div className="fixed top-10 left-1/2 transform -translate-x-1/2 bg-[#2d2a26] text-white px-6 py-3 rounded-full font-bold shadow-[0_4px_10px_rgba(0,0,0,0.3)] z-[100] border-[3px] border-[#fffdfa] animate-fadeIn">{toastMsg}</div>}
          </div>
        );
      }

      const cLevel = randomLevelData || { islands: [], description: "" };
      const SCALE = 65; const PADDING = 85; const ISLAND_RADIUS = 22;
      const islData = cLevel.islands || [];
      const gridWidth = cLevel.width || 10;
      const gridHeight = cLevel.height || 10;
      const svgW = gridWidth * SCALE + PADDING * 2;
      const svgH = gridHeight * SCALE + PADDING * 2;
      const hasSolution = cLevel.solution && cLevel.solution.length > 0;

      return (
        <div className="h-screen w-screen p-1 md:p-4 flex flex-col items-center font-sans overflow-hidden animate-fadeIn">
          <div className="w-full max-w-[1200px] bg-[#fffdfa] rounded-xl border-4 border-[#2d2a26] shadow-[8px_8px_0px_#2d2a26] flex flex-col h-full relative z-10 overflow-hidden">
            
            <div className={`bg-[#ffcc00] border-b-4 border-[#2d2a26] text-[#2d2a26] shrink-0 z-20 relative transition-all duration-300 ease-in-out ${isHeaderCollapsed ? 'p-2' : 'p-3 md:p-4'}`}>
              <div className={`flex flex-wrap items-center justify-between gap-2 w-full`}>
                <div className="flex items-center gap-3 flex-wrap">
                   <h1 className={`font-black tracking-tight uppercase transition-all duration-500 ${isHeaderCollapsed ? 'text-lg px-2' : 'text-2xl md:text-3xl'}`}>🌉 數橋</h1>
                   <div className="flex items-center gap-1 bg-[#2d2a26] text-white px-2 md:px-3 py-1 rounded-lg font-mono font-bold shadow-[2px_2px_0px_rgba(0,0,0,0.4)] text-sm md:text-base">⏱ {formatTime(elapsedTime)}</div>
                   {engineRef.current !== 'none' && ( <span className="bg-emerald-400 text-[#2d2a26] px-2 py-1 rounded-lg border-2 border-[#2d2a26] font-black text-xs md:text-sm shadow-[2px_2px_0px_#2d2a26] animate-pulse flex items-center gap-1">{isHostRef.current ? '👑 主機' : '👤 玩家'} | 代碼: {roomId} {engineRef.current === 'firebase' && '☁️'}</span> )}
                </div>

                <div className="flex items-center gap-2 flex-wrap ml-auto justify-end">
                   <div className={`flex items-center gap-1 md:gap-2 overflow-hidden transition-all duration-500 ease-in-out ${isHeaderCollapsed ? 'max-w-[400px] opacity-100' : 'max-w-0 opacity-0 pointer-events-none'}`}>
                     <div className="flex items-center gap-1 md:gap-2 w-max">
                       <select value={currentLevelId} onChange={function(e){handleLevelChange(Number(e.target.value));}} className={`px-2 py-1 rounded-md border-2 border-[#2d2a26] font-bold bg-white text-[#2d2a26] text-sm outline-none shadow-[2px_2px_0px_#2d2a26] max-w-[120px] sm:max-w-none cursor-pointer`}>
                         {LEVELS.map(function(level){return <option key={level.id} value={level.id}>{level.name}</option>;})}
                       </select>
                       {engineRef.current === 'none' && <button onClick={handleUndo} disabled={history.length === 0 || isWon} className="px-2 py-1 bg-white border-2 border-[#2d2a26] rounded-md font-bold text-sm shadow-[2px_2px_0px_#2d2a26] disabled:opacity-50">↩️</button>}
                       <button onClick={handleReset} className="px-2 py-1 bg-red-500 text-white border-2 border-[#2d2a26] rounded-md font-bold text-sm shadow-[2px_2px_0px_#2d2a26]">🔄</button>
                     </div>
                   </div>
                   <button onClick={function(){setShowSaveModal(true);}} className="px-2 md:px-3 py-1 bg-blue-500 text-white border-2 border-[#2d2a26] rounded-md font-bold text-sm md:text-base shadow-[2px_2px_0px_#2d2a26] hover:bg-blue-600 flex items-center gap-1" title="存檔/讀檔">💾 <span className="hidden md:inline">存檔</span></button>
                   <button onClick={function(){setIsHeaderCollapsed(!isHeaderCollapsed);}} className="px-2 md:px-3 py-1 bg-[#2d2a26] text-white border-2 border-[#2d2a26] rounded-md font-bold text-sm md:text-base shadow-[2px_2px_0px_rgba(0,0,0,0.3)] hover:bg-slate-800 flex items-center gap-1">{isHeaderCollapsed ? '🔽 展開' : '🔼 縮小'}</button>
                </div>
              </div>

              <div className={`w-full overflow-hidden transition-all duration-500 ease-in-out origin-top ${isHeaderCollapsed ? 'max-h-0 opacity-0 scale-y-95' : 'max-h-[1000px] opacity-100 scale-y-100 mt-2'}`}>
                 <div className="px-2 pb-2 md:px-4 md:pb-4 flex flex-col gap-2">
                    <div className="bg-white border-[3px] border-[#2d2a26] rounded-xl p-3 md:p-4 text-slate-800 shadow-[4px_4px_0px_#2d2a26] flex flex-col md:flex-row gap-4 mb-1 animate-fadeIn">
                      <div className="flex-1">
                        <h3 className="text-base md:text-lg font-black mb-1 md:mb-2 border-b-[3px] border-[#ffcc00] inline-block pb-1">📜 遊戲四大規則</h3>
                        <ol className="list-decimal list-outside ml-5 space-y-1 md:space-y-1.5 text-xs md:text-sm leading-relaxed font-bold">
                          <li>每個圓圈是一座「島」，數字代表需要幾座橋樑。</li>
                          <li>橋樑必須是垂直或水平方向。</li>
                          <li>橋樑之間絕對不能交叉或重疊。</li>
                          <li>兩座島之間最多架設 2 座橋，且完成時所有島嶼必須全部連通。</li>
                        </ol>
                      </div>
                      <div className="md:w-1/3 bg-[#ffcc00]/20 p-3 rounded-xl border-[3px] border-dashed border-[#2d2a26] flex flex-col justify-center relative">
                        <p className="text-slate-800 font-black text-sm md:text-base mb-1 flex items-center gap-1"><span>💡</span> 提示與狀態：</p>
                        <p className="text-slate-700 text-xs md:text-sm font-bold leading-relaxed">{cLevel.description}</p>
                        {engineRef.current !== 'none' && ( <div className="mt-2 text-xs text-emerald-800 font-bold bg-emerald-200 p-1.5 rounded-lg border-2 border-emerald-500 shadow-sm">連線對戰中，「復原」功能已停用。</div> )}
                      </div>
                    </div>

                    <div className="flex flex-wrap gap-2 items-center w-full bg-white/50 p-2 rounded-xl border-[3px] border-dashed border-[#2d2a26] animate-fadeIn">
                      <span className="font-bold text-[#2d2a26] ml-1 text-sm md:text-base hidden sm:inline">選擇題型：</span>
                      <select value={currentLevelId} onChange={function(e){handleLevelChange(Number(e.target.value));}} className={`px-2 py-1.5 rounded-md border-2 border-[#2d2a26] font-bold bg-white text-[#2d2a26] text-xs md:text-base outline-none shadow-[3px_3px_0px_#2d2a26] max-w-[140px] sm:max-w-none cursor-pointer`}>
                        {LEVELS.map(function(level){return <option key={level.id} value={level.id}>{level.name}</option>;})}
                      </select>
                      {engineRef.current !== 'none' && <span className="text-xs font-bold text-slate-700 bg-white/50 px-1 py-1 rounded">(連線中，大家都能切換題目喔)</span>}
                      
                      <div className="ml-auto flex gap-2 flex-wrap justify-end">
                         {!isWon && hasSolution && !showSolution && ( <button onClick={handleShowSolution} className="px-2 md:px-4 py-1.5 bg-yellow-400 text-[#2d2a26] border-2 border-[#2d2a26] rounded-md font-bold text-xs md:text-base shadow-[3px_3px_0px_#2d2a26] active:translate-y-1 active:shadow-none transition-all flex items-center gap-1">💡 解答</button> )}
                         <button onClick={handleRegenerateRandom} className="px-2 md:px-4 py-1.5 bg-blue-500 text-white border-2 border-[#2d2a26] rounded-md font-bold text-xs md:text-base shadow-[3px_3px_0px_#2d2a26] active:translate-y-1 active:shadow-none transition-all flex items-center gap-1">🎲 新題</button>
                         {engineRef.current === 'none' && ( <button onClick={handleUndo} disabled={history.length === 0 || isWon} className="px-2 md:px-4 py-1.5 bg-white border-2 border-[#2d2a26] rounded-md font-bold text-xs md:text-base shadow-[3px_3px_0px_#2d2a26] disabled:opacity-50 disabled:shadow-none active:translate-y-1 active:shadow-none transition-all flex items-center gap-1 text-[#2d2a26]">↩️ <span className="hidden md:inline">復原</span></button> )}
                         <button onClick={handleReset} className="px-2 md:px-4 py-1.5 bg-red-500 text-white border-2 border-[#2d2a26] rounded-md font-bold text-xs md:text-base shadow-[3px_3px_0px_#2d2a26] active:translate-y-1 active:shadow-none transition-all flex items-center gap-1">🔄 <span className="hidden md:inline">重置</span></button>
                         <div className="w-[2px] h-6 bg-[#2d2a26] opacity-30 mx-1 hidden md:block"></div>
                         <button onClick={handleGoHome} className="bg-white hover:bg-slate-100 text-[#2d2a26] border-2 border-[#2d2a26] px-2 md:px-4 py-1.5 rounded-md font-bold text-xs md:text-base shadow-[3px_3px_0px_#2d2a26] active:translate-y-1 active:shadow-none transition-all flex items-center gap-1">
                           {engineRef.current === 'none' ? '🏠 回首頁' : (isHostRef.current ? '🔌 斷線並回到首頁' : '🔌 退出連線')}
                         </button>
                      </div>
                    </div>
                 </div>
              </div>
            </div>

            {engineRef.current !== 'none' && (
              <div className="px-4 py-2 bg-[#f4f1ea] border-b-[3px] border-[#2d2a26] flex flex-wrap gap-2 items-center z-10 shadow-inner shrink-0">
                <span className="font-black text-[#2d2a26] text-sm">👥 參與玩家：</span>
                {playersList.map(function(p, idx) {
                  const isMe = p.id === myId;
                  return (
                    <span key={idx} 
                          onClick={function(){ if (!isMe) handlePlayerColorChange(p.id); }} 
                          title={isMe ? "這是你 (自己畫的線固定為黑色)" : "點擊可切換該玩家的代表色"} 
                          className={`px-2 py-0.5 rounded border-2 border-[#2d2a26] text-xs font-bold bg-white text-[#2d2a26] flex items-center shadow-sm ${!isMe ? 'cursor-pointer hover:bg-slate-100 transition-colors' : ''}`} 
                          style={{ borderLeftColor: isMe ? '#2d2a26' : p.color, borderLeftWidth: '6px' }}>
                      {p.name} {p.isHost && '👑'} {isMe && '(你)'}
                    </span>
                  );
                })}
              </div>
            )}

            {!isHeaderCollapsed && (
              <div className="h-8 shrink-0 flex items-center justify-center bg-[#2d2a26] text-[#ffcc00] border-b-4 border-[#2d2a26] z-10 font-bold tracking-wide">
                <span className="text-xs md:text-sm hidden md:inline">支援滑鼠單指拖曳畫布、滾輪縮放；向下滑動畫布可自動收合選單。</span>
                <span className="text-xs md:text-sm md:hidden">點擊島嶼間空白處架橋。支援雙指縮放與單指平移。</span>
              </div>
            )}

            <div className="relative flex-1 flex flex-col min-h-0 bg-[#fffdfa]">
              
              <div className="absolute bottom-4 right-4 md:bottom-6 md:right-6 flex flex-col gap-2 md:gap-3 z-20 pointer-events-auto">
                <button onClick={handleZoomIn} title="放大" className="w-10 h-10 md:w-12 md:h-12 bg-white border-[3px] border-[#2d2a26] rounded-full font-black text-xl md:text-2xl shadow-[3px_3px_0px_#2d2a26] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center text-[#2d2a26]">+</button>
                <button onClick={handleZoomOut} title="縮小" className="w-10 h-10 md:w-12 md:h-12 bg-white border-[3px] border-[#2d2a26] rounded-full font-black text-2xl md:text-3xl shadow-[3px_3px_0px_#2d2a26] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center text-[#2d2a26]">-</button>
                <button onClick={handleZoomReset} title="重置比例" className="w-10 h-10 md:w-12 md:h-12 bg-[#2d2a26] border-[3px] border-[#2d2a26] rounded-full font-black text-xs md:text-sm shadow-[3px_3px_0px_rgba(0,0,0,0.5)] active:translate-y-1 active:shadow-none transition-all flex items-center justify-center text-white">1x</button>
              </div>

              <div ref={zoomContainerRef} className="p-2 md:p-6 flex-1 overflow-auto custom-scrollbar relative">
                <div className="flex justify-center items-center min-w-max min-h-max m-auto pb-24 pr-20">
                  <svg viewBox={`0 0 ${svgW} ${svgH}`} className="bg-transparent transition-transform duration-100 ease-out origin-center" style={{ width: `${svgW * zoomLevel}px`, height: `${svgH * zoomLevel}px`, touchAction: 'manipulation' }}>
                    <g className="pointer-events-none opacity-10">
                       {Array.from({length: gridWidth}).map(function(_, i) { return <line key={`v${i}`} x1={i*SCALE+PADDING} y1={PADDING} x2={i*SCALE+PADDING} y2={svgH - PADDING} stroke="#2d2a26" strokeWidth="1" />; })}
                       {Array.from({length: gridHeight}).map(function(_, i) { return <line key={`h${i}`} x1={PADDING} y1={i*SCALE+PADDING} x2={svgW - PADDING} y2={i*SCALE+PADDING} stroke="#2d2a26" strokeWidth="1" />; })}
                    </g>

                    {showSolution && cLevel.solution && cLevel.solution.map(function(sol, idx) {
                        const islandsMap = {}; islData.forEach(function(i) { islandsMap[i.id] = i; });
                        const f = islandsMap[sol.from], t = islandsMap[sol.to];
                        if (!f || !t) return null;
                        return <line key={`sol-${idx}`} x1={f.x*SCALE+PADDING} y1={f.y*SCALE+PADDING} x2={t.x*SCALE+PADDING} y2={t.y*SCALE+PADDING} stroke="#ef4444" strokeWidth={sol.count*4} strokeOpacity="0.3" strokeDasharray="5,5" className="solution-line pointer-events-none" />;
                    })}

                    {bridges.map(function(b){
                      const islMap = {}; islData.forEach(function(i){islMap[i.id]=i;});
                      const f=islMap[b.from], t=islMap[b.to];
                      if (!f || !t) return null;
                      const x1=f.x*SCALE+PADDING, y1=f.y*SCALE+PADDING, x2=t.x*SCALE+PADDING, y2=t.y*SCALE+PADDING;
                      
                      let lineStroke = "#2d2a26"; // 自己劃的線預設黑色
                      let lineOpacity = 1;
                      
                      if (engineRef.current !== 'none' && b.count > 0 && b.owner && b.owner !== myId) {
                          const ownerObj = playersList.find(function(p){return p.id === b.owner;});
                          lineStroke = ownerObj ? ownerObj.color : "#94a3b8"; 
                          lineOpacity = 0.6; 
                      }

                      return (
                        <g key={b.id} onClick={function(){ handleBridgeClick(b.id); }} className="cursor-pointer group">
                          <rect x={Math.min(x1,x2)-15} y={Math.min(y1,y2)-15} width={Math.abs(x1-x2)+30} height={Math.abs(y1-y2)+30} fill="transparent" className="group-hover:fill-yellow-300/20 transition-colors" />
                          {b.count === 1 && <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={lineStroke} strokeWidth="6" strokeLinecap="round" strokeOpacity={lineOpacity} className="transition-all" />}
                          {b.count === 2 && b.type === 'h' && ( <g><line x1={x1} y1={y1-5} x2={x2} y2={y2-5} stroke={lineStroke} strokeWidth="5" strokeLinecap="round" strokeOpacity={lineOpacity}/><line x1={x1} y1={y1+5} x2={x2} y2={y2+5} stroke={lineStroke} strokeWidth="5" strokeLinecap="round" strokeOpacity={lineOpacity}/></g> )}
                          {b.count === 2 && b.type === 'v' && ( <g><line x1={x1-5} y1={y1} x2={x2-5} y2={y2} stroke={lineStroke} strokeWidth="5" strokeLinecap="round" strokeOpacity={lineOpacity}/><line x1={x1+5} y1={y1} x2={x2+5} y2={y2} stroke={lineStroke} strokeWidth="5" strokeLinecap="round" strokeOpacity={lineOpacity}/></g> )}
                        </g>
                      );
                    })}

                    {islData.map(function(i){
                      const cx=i.x*SCALE+PADDING, cy=i.y*SCALE+PADDING, cur=islandCurrentCounts[i.id], s=cur===i.req, o=cur>i.req;
                      return (
                        <g key={i.id}>
                          <circle cx={cx+3} cy={cy+3} r={ISLAND_RADIUS} fill="rgba(45,42,38,0.15)" />
                          <circle cx={cx} cy={cy} r={ISLAND_RADIUS} fill={s?'#d1fae5':o?'#fee2e2':'#fff'} stroke={s?'#059669':o?'#dc2626':'#2d2a26'} strokeWidth="4" className="transition-colors duration-300" />
                          <text x={cx} y={cy+2} textAnchor="middle" dominantBaseline="central" className="text-xl font-black font-sans pointer-events-none transition-colors duration-300" fill={s?'#065f46':o?'#991b1b':'#2d2a26'}>{i.req}</text>
                        </g>
                      );
                    })}
                  </svg>
                </div>
              </div>
            </div>
          </div>

          {isWon && !hideVictoryModal && (
            <div className="fixed inset-x-0 bottom-6 flex justify-center pointer-events-none z-[60]">
              <div className="pointer-events-auto bg-white rounded-2xl p-5 md:p-8 border-[4px] border-[#2d2a26] shadow-[8px_8px_0px_#2d2a26] text-center min-w-[280px] md:min-w-[320px] animate-popUp relative">
                <button onClick={function(){setHideVictoryModal(true);}} className="absolute top-2 right-4 text-slate-400 hover:text-[#2d2a26] text-2xl font-black">✕</button>
                <div className="text-5xl md:text-6xl mb-3">💥🏆</div>
                <h2 className="text-2xl md:text-3xl font-black text-[#2d2a26] mb-2 uppercase tracking-wide">PERFECT!</h2>
                <p className="text-slate-600 mb-1 text-sm md:text-base font-bold">所有的島嶼都成功連結了！</p>
                <p className="text-blue-600 mb-6 text-sm md:text-base font-bold border-b-[3px] border-dashed border-slate-300 pb-4">完成時間：{formatTime(elapsedTime)}</p>
                <div className="flex justify-center gap-3">
                  <button onClick={handleRegenerateRandom} className="px-5 py-3 bg-[#ffcc00] text-[#2d2a26] border-[4px] border-[#2d2a26] font-black rounded-xl shadow-[4px_4px_0px_#2d2a26] hover:translate-y-[2px] transition-all text-base md:text-lg">再來一局 ➔</button>
                </div>
              </div>
            </div>
          )}

          {isWon && hideVictoryModal && (
            <button onClick={function(){setHideVictoryModal(false);}} className="fixed bottom-6 left-1/2 transform -translate-x-1/2 bg-[#ffcc00] text-[#2d2a26] border-[4px] border-[#2d2a26] px-6 py-3 rounded-full shadow-[6px_6px_0px_#2d2a26] z-50 hover:translate-y-[2px] transition-all font-black flex items-center gap-2 tracking-wide text-lg">🏆 顯示成績</button>
          )}

          {showSaveModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4">
              <div className="bg-[#fffdfa] border-[4px] border-[#2d2a26] rounded-2xl p-6 shadow-[10px_10px_0px_#2d2a26] w-full max-w-md animate-fadeIn rotate-1">
                <h2 className="text-2xl font-black text-[#2d2a26] mb-2 border-b-[4px] border-blue-500 inline-block pb-1">💾 存檔與讀檔</h2>
                <p className="text-sm font-bold text-slate-600 mb-4">將進度轉換為代碼，下次貼上代碼即可恢復！</p>
                <div className="mb-6">
                  <button onClick={handleSaveCode} className="w-full py-3 bg-blue-500 text-white border-[3px] border-[#2d2a26] rounded-xl font-black shadow-[4px_4px_0px_#2d2a26] hover:translate-y-[2px] transition-all mb-3 text-base md:text-lg">產生進度代碼 (自動複製)</button>
                  <div className="relative">
                    <textarea id="saveCodeTextarea" value={saveCode} onChange={function(e){setSaveCode(e.target.value);}} placeholder="點擊上方按鈕生成，或是手動貼上舊代碼至此處" rows="4" className="w-full border-[3px] border-[#2d2a26] rounded-xl p-3 pb-12 font-mono text-sm shadow-inner outline-none focus:bg-blue-50 break-all bg-white" />
                    <button onClick={handleQuickPaste} className="absolute bottom-3 right-3 bg-[#ffcc00] text-[#2d2a26] px-3 py-1.5 rounded-lg text-sm font-black border-[2px] border-[#2d2a26] hover:bg-[#e6b800] shadow-[2px_2px_0px_#2d2a26] transition-all active:translate-y-[1px]">📋 快速貼上</button>
                  </div>
                </div>
                <div className="flex gap-4">
                  <button onClick={function(){setShowSaveModal(false);}} className="flex-1 py-3 bg-white border-[3px] border-[#2d2a26] rounded-xl font-black text-[#2d2a26] shadow-[4px_4px_0px_#2d2a26] hover:translate-y-[2px] transition-all">關閉</button>
                  <button onClick={handleLoadCode} className="flex-1 py-3 bg-emerald-400 text-[#2d2a26] border-[3px] border-[#2d2a26] rounded-xl font-black shadow-[4px_4px_0px_#2d2a26] hover:translate-y-[2px] transition-all">載入代碼</button>
                </div>
              </div>
            </div>
          )}

          {toastMsg && <div className="fixed top-10 left-1/2 transform -translate-x-1/2 bg-[#2d2a26] text-white px-6 py-3 rounded-full font-bold z-[100] border-[3px] border-[#fffdfa] shadow-xl animate-fadeIn">{toastMsg}</div>}
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<HashiGame />);
  </script>
</body>
</html>
